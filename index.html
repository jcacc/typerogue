// ── HTML helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sp(text, color) { return `<span style="color:${color}">${esc(text)}</span>`; }
function dim(t)  { return sp(t, C.dim); }
function hi(t)   { return sp(t, C.hi); }
function wh(t)   { return sp(t, C.white); }

function bar(hp, maxHp, label) {
  const pct = Math.max(0, Math.min(hp / maxHp, 1));
  const n = 16, filled = Math.round(pct * n);
  const b = '[' + '='.repeat(filled) + '.'.repeat(n - filled) + ']';
  const col = hp < maxHp * 0.3 ? C.red : hp < maxHp * 0.6 ? C.gold : C.txt;
  return (label ? sp(label + ' ', C.dim) : '') + sp(b, col) + sp(' ' + hp + '/' + maxHp, col);
}

// ── Best run ───────────────────────────────────────────────────────────────────
function loadBestRun() {
  try { return JSON.parse(localStorage.getItem('typerogue_best')) || null; } catch { return null; }
}
function saveBestRun(outcome) {
  const cur  = { outcome, floor:P.floor||1, kills:P.kills||0, gold:P.gold||0, classId:P.classId, difficulty:DIFFICULTIES[diffIdx].id };
  const prev = loadBestRun();
  function score(r) {
    if (!r) return -1;
    return (r.outcome === 'victory' ? 100000 : 0) + (r.floor * 1000) + r.kills;
  }
  if (score(cur) >= score(prev)) localStorage.setItem('typerogue_best', JSON.stringify(cur));
}
function bestRunLine() {
  const b = loadBestRun();
  if (!b) return '';
  const tag = b.outcome === 'victory' ? 'victory' : 'fl.' + b.floor;
  const dif = b.difficulty ? '  ' + b.difficulty : '';
  return tag + '  ' + b.classId + dif + '  ' + b.kills + ' kills  ¢' + b.gold;
}

let achievementBanner = null; // { name, timer }

function unlockAchievement(id) {
  if (earnedAchievements.has(id)) return false;
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return false;
  earnedAchievements.add(id);
  try { localStorage.setItem('typerogue_achievements', JSON.stringify([...earnedAchievements])); } catch {}
  achievementQueue.push(ach);
  if (RunStats && RunStats.newAchievements) RunStats.newAchievements.push(ach);
  return true;
}

function tickAchievementBanner(dt) {
  if (achievementBanner) {
    achievementBanner.timer -= dt;
    if (achievementBanner.timer <= 0) achievementBanner = null;
  }
  if (!achievementBanner && achievementQueue.length > 0) {
    achievementBanner = { ...achievementQueue.shift(), timer: 3000 };
  }
}

const DIFF_MULT = { Beginner: 0.7, Normal: 1.0, Hard: 1.5 };

async function signPayload(name, score, cls, difficulty, floor, outcome) {
  const msg = `${name.trim().toUpperCase()}:${score}:${cls}:${difficulty}:${floor}:${outcome}`;
  const key = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(LEADERBOARD_SECRET),
    { name:'HMAC', hash:'SHA-256' }, false, ['sign']
  );
  const buf = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function calcScore() {
  const acc = RunStats.totalKeys > 0 ? RunStats.correctKeys / RunStats.totalKeys : 0;
  const diffId = DIFFICULTIES[diffIdx] ? DIFFICULTIES[diffIdx].id : 'normal';
  const diffName = diffId.charAt(0).toUpperCase() + diffId.slice(1);
  const diffMult = DIFF_MULT[diffName] || 1.0;
  return Math.round(RunStats.dmgDealt * diffMult * Math.max(0.5, acc));
}

async function submitScore() {
  if (nameEntrySubmitting) return;
  nameEntrySubmitting = true;
  nameEntryError = '';
  const name = nameEntry.trim() || 'ANON';
  const diffId = DIFFICULTIES[diffIdx] ? DIFFICULTIES[diffIdx].id : 'normal';
  const diffName = diffId.charAt(0).toUpperCase() + diffId.slice(1);
  const acc = RunStats.totalKeys > 0 ? Math.round(RunStats.correctKeys / RunStats.totalKeys * 1000) / 10 : 0;
  const floor = Math.min(P.floor || 1, 3);
  const outcome = G.runOutcome || 'defeat';
  const score = calcScore();
  const sig = await signPayload(name, score, P.classId, diffName, floor, outcome);
  const payload = {
    name, score,
    class: P.classId,
    difficulty: diffName,
    floor, outcome, sig,
    dmg: RunStats.dmgDealt || 0,
    words: RunStats.wordsDestroyed || 0,
    accuracy: acc,
  };
  try {
    const res = await fetch(LEADERBOARD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) { nameEntryError = data.error || 'Submission failed.'; }
    else {
      localStorage.setItem('tr_player_name', name.toUpperCase().slice(0, 20));
      nameEntryRank = data.rank;
    }
  } catch (e) {
    nameEntryError = 'Could not reach server.';
  }
  nameEntrySubmitting = false;
}

function pickWord() {
  const tiers = window.TYPERUN_WORDS.tiers;
  let pool = [];
  (enemy.wordTiers || [0,1]).forEach(t => pool.push(...tiers[t]));
  if (P.upgrades && P.upgrades.includes('dk_purge'))  pool = pool.filter(w => w.length < 10);
  if (P.upgrades && P.upgrades.includes('dk_inject')) pool = pool.concat(RD.powerWords);
  if (P.upgrades && P.upgrades.includes('dk_chaos'))  pool = pool.filter(w => w.length >= 5);
  const onScreen = new Set(words.map(w => w.text));
  const fresh = pool.filter(w => !onScreen.has(w));
  return rnd(fresh.length ? fresh : pool) || 'bash';
}

// ── Map generation ─────────────────────────────────────────────────────────────
function generateFloor(floorNum) {
  const FE = RD.floorEnemies[floorNum];
  const np = [...FE.normal].sort(() => Math.random() - 0.5);
  const fn = i => np[i % np.length];
  const diff = DIFFICULTIES[diffIdx].id;
  function mk(type, enemyId, col, row) {
    return { type, enemyId: enemyId || null, col, row, cleared:false, reachable:false, id:nodes.length };
  }
  const nodes = [];
  let adj, rowChar, mapRows;

  if (diff === 'beginner') {
    // ── 8 nodes · 2 branches · 5 rows ─────────────────────────────────────
    const shopA = Math.random() < 0.5;
    nodes.push(mk('entry',               null,        1, 0)); // 0
    nodes.push(mk('combat',              fn(0),       0, 1)); // 1
    nodes.push(mk(shopA?'shop':'rest',   null,        0, 2)); // 2
    nodes.push(mk('combat',              fn(1),       0, 3)); // 3
    nodes.push(mk('combat',              fn(2),       2, 1)); // 4
    nodes.push(mk('elite',               FE.elite[0], 2, 2)); // 5
    nodes.push(mk(shopA?'rest':'shop',   null,        2, 3)); // 6
    nodes.push(mk('boss',                FE.boss,     1, 4)); // 7
    adj = { 0:[1,4], 1:[2], 2:[3], 3:[7], 4:[5], 5:[6], 6:[7], 7:[] };
    rowChar = [0,3,6,9,12]; mapRows = 16;

  } else if (diff === 'normal') {
    // ── 10 nodes · 2 branches + event · 6 rows ────────────────────────────
    const shopA = Math.random() < 0.5;
    nodes.push(mk('entry',               null,        1, 0)); // 0
    nodes.push(mk('combat',              fn(0),       0, 1)); // 1
    nodes.push(mk('combat',              fn(1),       2, 1)); // 2
    nodes.push(mk('combat',              fn(2),       0, 2)); // 3
    nodes.push(mk('event',               null,        2, 2)); // 4
    nodes.push(mk(shopA?'shop':'rest',   null,        0, 3)); // 5
    nodes.push(mk('elite',               FE.elite[0], 2, 3)); // 6
    nodes.push(mk('combat',              fn(3),       0, 4)); // 7
    nodes.push(mk(shopA?'rest':'shop',   null,        2, 4)); // 8
    nodes.push(mk('boss',                FE.boss,     1, 5)); // 9
    adj = { 0:[1,2], 1:[3], 2:[4], 3:[5], 4:[6], 5:[7], 6:[8], 7:[9], 8:[9], 9:[] };
    rowChar = [0,3,6,9,12,15]; mapRows = 18;

  } else {
    // ── 14 nodes · 3 branches · 2 elites · 2 events · 6 rows ─────────────
    nodes.push(mk('entry',               null,        1, 0)); // 0
    nodes.push(mk('combat',              fn(0),       0, 1)); // 1
    nodes.push(mk('combat',              fn(1),       1, 1)); // 2
    nodes.push(mk('combat',              fn(2),       2, 1)); // 3
    nodes.push(mk('event',               null,        0, 2)); // 4
    nodes.push(mk('elite',               FE.elite[0], 1, 2)); // 5
    nodes.push(mk(Math.random()<.5?'shop':'rest', null, 2, 2)); // 6
    nodes.push(mk('combat',              fn(3),       0, 3)); // 7
    nodes.push(mk(Math.random()<.5?'shop':'rest', null, 1, 3)); // 8
    nodes.push(mk('event',               null,        2, 3)); // 9
    nodes.push(mk(Math.random()<.5?'rest':'shop', null, 0, 4)); // 10
    nodes.push(mk('combat',              fn(1),       1, 4)); // 11
    nodes.push(mk('elite',               FE.elite[0], 2, 4)); // 12
    nodes.push(mk('boss',                FE.boss,     1, 5)); // 13
    adj = {
      0:[1,2,3], 1:[4], 2:[5], 3:[6],
      4:[7], 5:[8], 6:[9],
      7:[10], 8:[11], 9:[12],
      10:[13], 11:[13], 12:[13], 13:[],
    };
    rowChar = [0,3,6,9,12,15]; mapRows = 18;
  }

  nodes[0].reachable = true;
  return { nodes, adj, floor:floorNum, rowChar, mapRows };
}

function buildMap() {
  const mapData = generateFloor(P.floor || 1);
  mapNodes = mapData.nodes;
  mapCurIdx = 0;
  mapNodes[0].cleared = true;
  (mapData.adj[0] || []).forEach(i => { mapNodes[i].reachable = true; });
  G.mapAdj = mapData.adj;
  G.mapRowChar = mapData.rowChar;
  G.mapRows = mapData.mapRows;
  mapSelIdx = 1;
}

function mapNavigate(dir) {
  const reachable = mapNodes
    .map((n, i) => ({ n, i }))
    .filter(({ n }) => n.reachable && !n.cleared)
    .sort((a, b) => a.i - b.i);
  if (!reachable.length) return;
  const cur = reachable.findIndex(r => r.i === mapSelIdx);
  mapSelIdx = reachable[(cur + dir + reachable.length) % reachable.length].i;
}

// ── Combat init ────────────────────────────────────────────────────────────────
function initCombat(enemyId) {
  const eData = RD.enemies[enemyId];
  if (!eData) { console.error('Unknown enemy:', enemyId); return; }
  const diff = DIFFICULTIES[diffIdx];
  enemy = {
    ...eData,
    hp:               Math.round(eData.hp * diff.enemyHp),
    maxHp:            Math.round(eData.hp * diff.enemyHp),
    attackDmg:        Math.round(eData.attackDmg * diff.attackDmg),
    attackInterval:   eData.attackInterval * diff.attackInterval,
    currentPhase:0, phasesFired:new Set(),
    effectiveSpeed:   eData.wordSpeed    * (P.wordSpeedMult || 1.0) * diff.wordSpeed,
    effectiveInterval:eData.wordInterval * diff.interval,
  };
  words = []; typed = ''; activeWordIdx = -1;
  combatTick = 0;
  spawnTimer  = enemy.effectiveInterval * 0.5;
  attackTimer = enemy.attackInterval * 0.7;
  freezeTimer = 0; hasteTimer = 0; slowTimer = 0; wardTimer = 0; leechTimer = 0; flashTimer = 0; flashMsg = '';
  chainCount = 0; reaveActive = false; lastWordDmg = 0; markedWordText = null;
  if (eData.type === 'boss') RunStats.bossNoDamage = true;
  scrambleTimer = eData.special === 'scramble' ? 15000 : 0;
  pickupTimer = 14000 + Math.random() * 8000;
  invisWordCount = 0;
  floats = [];
  comboCount = 0; comboTime = 0;
  paused = false;
  if (P.combatShield) P.shield = (P.shield || 0) + P.combatShield;
  if (eData.type === 'boss') RA.setTheme('boss');
  G.screen = 'combat';
}

// ── Combat update ──────────────────────────────────────────────────────────────
function updateCombat(dt) {
  if (paused) return;

  combatTick += dt;

  const frozen = freezeTimer > 0;
  if (frozen) freezeTimer -= dt;
  if (hasteTimer > 0) hasteTimer -= dt;
  if (slowTimer  > 0) slowTimer  = Math.max(0, slowTimer  - dt);
  if (wardTimer  > 0) wardTimer  = Math.max(0, wardTimer  - dt);
  if (leechTimer > 0) leechTimer = Math.max(0, leechTimer - dt);
  if (flashTimer > 0) flashTimer -= dt;
  (P.spellCDs || []).forEach((cd, i) => { if (cd > 0) P.spellCDs[i] = Math.max(0, cd - dt); });

  if (enemy.id === 'dread_sorcerer') {
    scrambleTimer -= dt;
    if (scrambleTimer <= 0) {
      scrambleTimer = 15000;
      words.forEach(w => { w.x = rnd(LANE_X) + (Math.random() - 0.5) * 60; });
      spawnFloat(W/2, H/2 - 40, 'SCRAMBLE!', C.red);
    }
  }

  const speedFactor = frozen ? 0 : slowTimer > 0 ? 0.2 : hasteTimer > 0 ? 0.6 : 1.0;
  const speedMod = (P.upgrades && P.upgrades.includes('dk_chaos')) ? 2.0 : 1.0;

  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.y += w.speed * speedFactor * speedMod * (dt / 1000);
    if (w.invisBlinkTimer !== undefined) w.invisBlinkTimer -= dt;

    if (w.y >= WORD_EXIT_Y + 10) {
      if (w.isAttack) {
        if (wardTimer > 0) {
          spawnFloat(W/2, WORD_EXIT_Y - 10, 'WARDED!', C.blue);
          words.splice(i, 1);
          if (activeWordIdx >= i) activeWordIdx = Math.max(-1, activeWordIdx - 1);
          updateActiveWord();
          continue;
        }
        let dmg = enemy.attackDmg;
        if (P.shield > 0) {
          const ab = Math.min(dmg, P.shield);
          P.shield -= ab; dmg -= ab;
          spawnFloat(W/2, WORD_EXIT_Y - 10, `-${ab}shld`, C.blue);
        }
        if (dmg > 0) {
          P.hp = Math.max(0, P.hp - dmg);
          if (enemy.type === 'boss') RunStats.bossNoDamage = false;
          RA.playPlayerHit();
          spawnFloat(W/2, WORD_EXIT_Y - 10, `-${dmg}`, C.red);
          flashTimer = 400; flashMsg = `-${dmg} HP`; flashColor = C.red;
          comboCount = 0; comboTime = 0;
        }
        if (i === activeWordIdx) { typed = ''; activeWordIdx = -1; }
      }
      words.splice(i, 1);
      if (activeWordIdx >= i) activeWordIdx = Math.max(-1, activeWordIdx - 1);
      updateActiveWord();
    }
  }

  spawnTimer -= dt;
  if (spawnTimer <= 0) { spawnCombatWord(); spawnTimer = enemy.effectiveInterval * (frozen ? 2 : 1); }

  attackTimer -= dt;
  if (attackTimer <= 0) { spawnCombatWord(true); attackTimer = enemy.attackInterval; }

  if (!frozen) {
    pickupTimer -= dt;
    if (pickupTimer <= 0) { spawnPickup(); pickupTimer = 14000 + Math.random() * 8000; }
  }

  if (enemy.phases && enemy.phases.length > 0) {
    const maxHp = RD.enemies[enemy.id].hp;
    enemy.phases.forEach((ph, idx) => {
      if (!enemy.phasesFired.has(idx) && enemy.hp / maxHp <= ph.hpThreshold) {
        enemy.phasesFired.add(idx);
        enemy.effectiveSpeed    *= ph.speedMult    || 1;
        enemy.effectiveInterval *= ph.intervalMult || 1;
        enemy.currentPhase = idx + 1;
        RA.playBossPhase();
        flashMsg = ph.announce || 'PHASE CHANGE!'; flashColor = '#993366'; flashTimer = 2000;
        spawnFloat(W/2, H/2, ph.announce || 'PHASE!', '#993366');
      }
    });
  }

  updateFloats(dt);
  tickAchievementBanner(dt);

  if (P.hp <= 0) {
    if (P.deathless && !P.deathlessUsed) {
      P.hp = 1; P.deathlessUsed = true;
      flashMsg = 'DEATHLESS!'; flashColor = '#993366'; flashTimer = 1500;
    } else { RA.playGameOver(); RA.stopMusic(1.5); G.runOutcome = 'defeat'; RunStats.endTime = Date.now(); checkRunAchievements(); checkClassUnlock(); saveBestRun('defeat'); track('run_end', { outcome: 'defeat', class: P.classId, floor: P.floor || 1, difficulty: DIFFICULTIES[diffIdx].id }); runSummaryScroll = 0; beginNameEntry(); return; }
  }

  if (enemy.hp <= 0) {
    enemy.hp = 0; words = [];
    RA.playRoomClear();
    P.kills = (P.kills || 0) + 1;
    const lootGold = (enemy.loot && enemy.loot.gold) || 0;
    P.gold = (P.gold || 0) + lootGold;
    RunStats.goldEarned = (RunStats.goldEarned || 0) + lootGold;
    if (enemy.type === 'boss' && RunStats.bossNoDamage) unlockAchievement('untouchable');
    mapNodes[G.combatNodeIdx].cleared = true;
    (G.mapAdj[G.combatNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
    mapSelIdx = (G.mapAdj[G.combatNodeIdx] || [])[0] || 0;
    if (P.regenPerRoom) P.hp = Math.min(P.maxHp, P.hp + P.regenPerRoom);

    upgradeOptions = pickUpgrades(3); upgradeChosen = false; upgradeSelIdx = 0;
    if (enemy.type === 'boss') {
      if (enemy.id === 'tyrant_prime') { G.runOutcome = 'victory'; RunStats.endTime = Date.now(); checkRunAchievements(); checkClassUnlock(); saveBestRun('victory'); track('run_end', { outcome: 'victory', class: P.classId, floor: P.floor || 3, difficulty: DIFFICULTIES[diffIdx].id }); runSummaryScroll = 0; RA.playVictory(); RA.stopMusic(2); beginNameEntry(); return; }
      P.floor = (P.floor || 1) + 1;
      RA.setTheme('dungeon'); G.screen = 'combat_result';
    } else {
      G.screen = 'upgrade'; RA.setTheme('dungeon');
    }
  }
}

function spawnCombatWord(isAttack) {
  if (!isAttack) {
    const nonAttack = words.filter(w => !w.isAttack && !w.isPickup).length;
    if (nonAttack >= DIFFICULTIES[diffIdx].maxWords) return;
  }
  const isInvis = enemy.special === 'invisible' && !isAttack && (invisWordCount % 3 === 2);
  if (enemy.special === 'invisible') invisWordCount++;
  const atkWords = RD.attackWords[enemy.floor] || RD.attackWords[1];
  const txt = isAttack ? rnd(atkWords) : pickWord();

  // Pick the least-crowded lane near the top, then stagger y above any existing word
  const MIN_GAP = 48;
  const laneOrder = [0, 1, 2].sort(() => Math.random() - 0.5);
  let lane = laneOrder[0];
  for (const li of laneOrder) {
    const blocked = words.some(w => Math.abs(w.x - LANE_X[li]) < 70 && w.y < WORD_SPAWN_Y + MIN_GAP);
    if (!blocked) { lane = li; break; }
  }
  const laneWords = words.filter(w => Math.abs(w.x - LANE_X[lane]) < 70);
  const topY = laneWords.length ? Math.min(...laneWords.map(w => w.y)) : WORD_SPAWN_Y;
  const spawnY = Math.min(WORD_SPAWN_Y, topY - MIN_GAP);

  words.push({
    text:txt, x:LANE_X[lane] + (Math.random()-0.5)*50,
    y:spawnY, speed:enemy.effectiveSpeed,
    isAttack:!!isAttack, invisible:!!isInvis, invisBlinkTimer:isInvis ? 800 : 0,
  });
  updateActiveWord();
}

// ── Pickups ────────────────────────────────────────────────────────────────────
const PICKUP_SYMS = ['!','@','#','$','%','&','*','(',')'];
const PICKUP_EFFECTS = [
  { type:'hp',     amount:20,  label:'+20hp',   color:C.cyan  },
  { type:'hp',     amount:35,  label:'+35hp',   color:C.cyan  },
  { type:'gold',   amount:25,  label:'+¢25',    color:C.gold  },
  { type:'shield', amount:20,  label:'+shld20', color:C.blue  },
  { type:'dmg',    amount:0.3, label:'+0.3dmg', color:C.hi    },
];

function spawnPickup() {
  const eff = PICKUP_EFFECTS[Math.floor(Math.random() * PICKUP_EFFECTS.length)];
  const len = Math.random() < 0.5 ? 2 : 3;
  let sym = '';
  for (let i = 0; i < len; i++) sym += PICKUP_SYMS[Math.floor(Math.random() * PICKUP_SYMS.length)];
  words.push({
    text:sym, x:LANE_X[Math.floor(Math.random()*3)] + (Math.random()-0.5)*40,
    y:WORD_SPAWN_Y, speed:9, isAttack:false, invisible:false, invisBlinkTimer:0,
    isPickup:true, pickupEffect:eff,
  });
  updateActiveWord();
}

function updateActiveWord() {
  if (typed.length === 0) { activeWordIdx = -1; return; }
  activeWordIdx = words.findIndex(w => w.text.startsWith(typed));
}

// ── Float text ─────────────────────────────────────────────────────────────────
function spawnFloat(x, y, str, color) {
  floats.push({ x, y, str, color, life:1, vy:-0.8 });
}
function updateFloats(dt) {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.y += f.vy; f.life -= 0.018;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

// ── Destroy word ───────────────────────────────────────────────────────────────
function destroyWord(idx) {
  if (idx < 0 || idx >= words.length) return;
  const w = words[idx];

  if (w.isPickup) {
    const eff = w.pickupEffect;
    if (eff.type === 'hp')     P.hp = Math.min(P.maxHp, P.hp + eff.amount);
    if (eff.type === 'gold')   { P.gold = (P.gold || 0) + eff.amount; RunStats.goldEarned += eff.amount; }
    if (eff.type === 'shield') P.shield = (P.shield || 0) + eff.amount;
    if (eff.type === 'dmg')    P.dmgMult += eff.amount;
    RA.playWordDestroy();
    spawnFloat(w.x, w.y - 20, eff.label, eff.color);
    words.splice(idx, 1);
    if (activeWordIdx >= idx) activeWordIdx = Math.max(-1, activeWordIdx - 1);
    typed = ''; updateActiveWord();
    return;
  }

  let dmg = Math.ceil(w.text.length * P.dmgMult);
  if (P.longshot && w.text.length >= 8) dmg *= 3;
  if (P.upgrades && P.upgrades.includes('dk_chaos')) dmg *= 2;
  if (P.berserk  && P.hp < P.maxHp * 0.3) dmg = Math.ceil(dmg * 1.75);
  if (P.warAxe   && P.hp < P.maxHp * 0.4) dmg = Math.ceil(dmg * 2.0);
  if (P.classId === 'ranger' && w.text.length >= 6) dmg = Math.ceil(dmg * 1.75);
  if (P.classId === 'necromancer' && w.isAttack) {
    dmg = Math.ceil(dmg * 2);
    P.hp = Math.min(P.maxHp, P.hp + 6);
    spawnFloat(W/2 + 20, WORD_EXIT_Y - 20, '+6', C.cyan);
  }

  // ── Combo ──
  const cWindow = P.classId === 'rogue' ? 2000 : COMBO_WINDOW;
  if (comboCount > 0 && (combatTick - comboTime) <= cWindow) comboCount = Math.min(comboCount + 1, 20);
  else comboCount = 1;
  comboTime = combatTick;
  if (comboCount >= 10) unlockAchievement('combo_king');
  const cMult = comboCount >= 10 ? 2.0 : comboCount >= 6 ? 1.5 : comboCount >= 3 ? 1.25 : 1.0;
  if (cMult > 1.0) dmg = Math.ceil(dmg * cMult);

  // ── Spell effects on word destroy ──
  let extraLabel = '';
  if (reaveActive) {
    const reaveMult = 3 * ((P.spellStacks && P.spellStacks['reave']) || 1);
    dmg = Math.ceil(dmg * reaveMult);
    reaveActive = false;
    extraLabel = ' REAVE!';
  }
  if (w.text === markedWordText && markedWordText) {
    const markMult = P.spellStacks && P.spellStacks['mark'] >= 3 ? 10 : P.spellStacks && P.spellStacks['mark'] >= 2 ? 7 : 5;
    dmg = Math.ceil(dmg * markMult);
    markedWordText = null;
    extraLabel += ' MARK!';
  }
  if (chainCount > 0) {
    dmg = Math.ceil(dmg * 1.5);
    chainCount--;
    extraLabel += ' ×chain';
  }

  enemy.hp = Math.max(0, enemy.hp - dmg);
  lastWordDmg = dmg;
  RunStats.wordsDestroyed++;
  RunStats.dmgDealt += dmg;
  if (w.text.length >= 10) unlockAchievement('lexicographer');
  if (RunStats.wordsDestroyed >= 150) unlockAchievement('wordsmith');
  RA.playWordDestroy(); RA.playEnemyHit();
  const floatLabel = (cMult > 1.0 ? `-${dmg} ×${cMult}` : `-${dmg}`) + extraLabel;
  spawnFloat(w.x, w.y - 20, floatLabel, C.gold);

  const vheal = (P.vampiric ? 2 : 0) + (P.vampiricEdge ? 4 : 0);
  if (vheal > 0) {
    P.hp = Math.min(P.maxHp, P.hp + vheal);
    spawnFloat(W/2 + 20, WORD_EXIT_Y - 20, `+${vheal}`, C.txt);
  }
  if (leechTimer > 0) {
    const lheal = w.text.length * ((P.spellStacks && P.spellStacks['leech']) || 1);
    P.hp = Math.min(P.maxHp, P.hp + lheal);
    spawnFloat(W/2 - 20, WORD_EXIT_Y - 20, `+${lheal}`, C.cyan);
  }

  words.splice(idx, 1);
  if (activeWordIdx >= idx) activeWordIdx = Math.max(-1, activeWordIdx - 1);
  typed = ''; updateActiveWord();
}

// ── Spells ─────────────────────────────────────────────────────────────────────
function activateSpell(spellIdx) {
  const spellName = P.spells[spellIdx];
  if ((P.spellCDs[spellIdx] || 0) > 0) return;
  const upg = RD.upgrades.find(u => u.spell === spellName);
  if (!upg) return;
  const amp = P.spellAmp ? 1.5 : 1.0;
  const stacks = (P.spellStacks && P.spellStacks[spellName]) || 1;
  const stackMult = stacks >= 3 ? 2.0 : stacks >= 2 ? 1.5 : 1.0;
  const totalAmp = amp * stackMult;
  P.spellCDs[spellIdx] = Math.round(upg.cd * (P.spellCDMult || 1));
  RA.playSpellCast();
  switch (spellName) {
    case 'freeze':  freezeTimer = Math.max(freezeTimer, 0) + 3000 * totalAmp; spawnFloat(W/2, 160, 'FREEZE!', C.blue); break;
    case 'shield':  P.shield = (P.shield||0) + Math.floor(30*totalAmp); spawnFloat(W/2, WORD_EXIT_Y-30, `SHIELD+${Math.floor(30*totalAmp)}`, C.blue); break;
    case 'nova': {
      const nd = Math.floor(15*totalAmp);
      enemy.hp = Math.max(0, enemy.hp - words.length * nd);
      spawnFloat(W/2, H/2, `NOVA! -${words.length*nd}`, C.hi);
      words = []; typed = ''; activeWordIdx = -1; break;
    }
    case 'haste':   hasteTimer = Math.max(hasteTimer, 0) + 5000 * totalAmp; spawnFloat(W/2, 160, 'HASTE!', C.gold); break;
    case 'drain': {
      const da = Math.floor(20*totalAmp);
      enemy.hp = Math.max(0, enemy.hp - da);
      P.hp = Math.min(P.maxHp, P.hp + da);
      spawnFloat(W/2, H/2, `DRAIN +${da}HP`, C.txt); break;
    }
    case 'blast': {
      const bd = Math.floor(80*totalAmp);
      enemy.hp = Math.max(0, enemy.hp - bd);
      spawnFloat(W/2, 160, `-${bd}`, C.hi); break;
    }
    case 'echo': {
      if (lastWordDmg > 0) {
        const ed = Math.floor(lastWordDmg * totalAmp);
        enemy.hp = Math.max(0, enemy.hp - ed);
        RunStats.dmgDealt += ed;
        spawnFloat(W/2, H/2, `ECHO -${ed}`, C.gold);
      } else {
        spawnFloat(W/2, H/2, 'ECHO (no word yet)', C.dim);
      }
      break;
    }
    case 'slow':  slowTimer  = Math.max(slowTimer,  0) + 4000 * totalAmp; spawnFloat(W/2, 160, 'SLOW!',  C.blue); break;
    case 'reave': reaveActive = true; spawnFloat(W/2, 160, 'REAVE!', C.hi); break;
    case 'ward':  wardTimer  = Math.max(wardTimer,  0) + 5000 * totalAmp; spawnFloat(W/2, 160, 'WARD!',  C.blue); break;
    case 'mark': {
      const candidates = words.filter(w => !w.isAttack && !w.isPickup);
      if (candidates.length > 0) {
        if (markedWordText) { const old = words.find(w => w.text === markedWordText); if (old) old.marked = false; }
        const target = rnd(candidates);
        target.marked = true;
        markedWordText = target.text;
        spawnFloat(W/2, 160, 'MARK!', C.gold);
      } else {
        spawnFloat(W/2, 160, 'MARK (no words)', C.dim);
      }
      break;
    }
    case 'leech': leechTimer = Math.max(leechTimer, 0) + 10000 * totalAmp; spawnFloat(W/2, 160, 'LEECH!', C.cyan); break;
    case 'volley': {
      const vcount = stacks >= 3 ? 7 : stacks >= 2 ? 5 : 3;
      const targets = words
        .filter(w => !w.isAttack && !w.isPickup)
        .sort((a, b) => a.text.length - b.text.length)
        .slice(0, vcount);
      const activeWord = activeWordIdx >= 0 ? words[activeWordIdx] : null;
      let vtotal = 0;
      for (const t of targets) {
        const vd = Math.ceil(t.text.length * P.dmgMult * amp);
        enemy.hp = Math.max(0, enemy.hp - vd);
        vtotal += vd;
        spawnFloat(t.x, t.y - 20, `-${vd}`, C.hi);
        const vi = words.indexOf(t);
        if (vi >= 0) { words.splice(vi, 1); if (activeWordIdx >= vi) activeWordIdx = Math.max(-1, activeWordIdx - 1); }
      }
      RunStats.dmgDealt += vtotal;
      if (!activeWord || !words.includes(activeWord)) { typed = ''; }
      updateActiveWord();
      spawnFloat(W/2, 160, `VOLLEY! ×${targets.length}`, C.hi);
      break;
    }
    case 'chain': chainCount += 5 * stacks; spawnFloat(W/2, 160, `CHAIN! +${5*stacks}`, C.gold); break;
    case 'smite': {
      const sd = Math.max(8, Math.floor(comboCount * 8 * totalAmp));
      enemy.hp = Math.max(0, enemy.hp - sd);
      RunStats.dmgDealt += sd;
      spawnFloat(W/2, 160, `SMITE -${sd}`, C.hi); break;
    }
  }
}

// ── Upgrades ───────────────────────────────────────────────────────────────────
function pickUpgrades(count) {
  const pool = [...RD.upgrades].filter(u => u.type !== 'gear').sort(() => Math.random() - 0.5);
  const result = [], usedTypes = new Set();
  for (const u of pool) {
    if (result.length >= count) break;
    if (!usedTypes.has(u.type)) { result.push(u); usedTypes.add(u.type); }
  }
  while (result.length < count) {
    const u = pool.find(x => !result.includes(x));
    if (u) result.push(u); else break;
  }
  return result.slice(0, count);
}

function applyUpgrade(upg) {
  if (!upg) return;
  if (!P.upgrades) P.upgrades = [];
  P.upgrades.push(upg.id);
  const e = upg.effect || {};
  if (e.maxHpBonus)   P.maxHp += e.maxHpBonus;
  if (e.healNow)      P.hp = Math.min(P.maxHp, P.hp + e.healNow);
  if (e.wordSpeedMult)P.wordSpeedMult = (P.wordSpeedMult||1) * e.wordSpeedMult;
  if (e.dmgMult)      P.dmgMult += e.dmgMult;
  if (e.regenPerRoom) P.regenPerRoom = (P.regenPerRoom||0) + e.regenPerRoom;
  if (e.berserk)      P.berserk = true;
  if (e.vampiric)     P.vampiric = true;
  if (e.longshot)     P.longshot = true;
  if (e.deathless)    P.deathless = true;
  if (e.chaos)        P.dmgMult *= 2;
  if (e.warAxe)       P.warAxe = true;
  if (e.vampiricEdge) P.vampiricEdge = true;
  if (e.combatShield) P.combatShield = (P.combatShield || 0) + e.combatShield;
  if (e.spellCDMult)  P.spellCDMult = (P.spellCDMult || 1) * e.spellCDMult;
  if (upg.type === 'spell' && upg.spell) {
    if (!P.spells) { P.spells = []; P.spellCDs = []; }
    if (!P.spellStacks) P.spellStacks = {};
    const curStacks = P.spellStacks[upg.spell] || 0;
    if (curStacks === 0) { P.spells.push(upg.spell); P.spellCDs.push(0); }
    P.spellStacks[upg.spell] = Math.min(3, curStacks + 1);
  }
}

// ── Run init ───────────────────────────────────────────────────────────────────
function startRun(classId) {
  const cls = RD.classes[classId];
  P = {
    classId, hp:Math.round((cls.hp + (classId==='warrior'?15:0)) * DIFFICULTIES[diffIdx].startHpMult),
    maxHp:Math.round((cls.hp + (classId==='warrior'?15:0)) * DIFFICULTIES[diffIdx].startHpMult),
    dmgMult:cls.dmgMult, wordSpeedMult:cls.wordSpeedMult,
    gold:DIFFICULTIES[diffIdx].startGold, floor:1, kills:0, spells:[], spellCDs:[], spellStacks:{}, upgrades:[],
    berserk:false, vampiric:false, longshot:false, deathless:false,
    warAxe:false, vampiricEdge:false, combatShield:0, spellCDMult:1.0,
    shield:0, regenPerRoom:0, spellAmp:classId==='mage',
  };
  if (cls.startSpell) { P.spells.push(cls.startSpell); P.spellCDs.push(0); P.spellStacks[cls.startSpell] = 1; }
  RunStats = { wordsDestroyed:0, dmgDealt:0, totalKeys:0, correctKeys:0, startTime:Date.now(), goldEarned:0, newAchievements:[] };
  track('run_start', { class: classId, difficulty: DIFFICULTIES[diffIdx].id });
  buildMap(); RA.setTheme('dungeon'); G.screen = 'map';
}

function enterNode(nodeIdx) {
  const node = mapNodes[nodeIdx];
  mapCurIdx = nodeIdx;
  // Lock other branches once a path is chosen
  const branches = G.mapAdj[0] || [];
  if (branches.includes(nodeIdx)) {
    branches.forEach(i => { if (i !== nodeIdx) mapNodes[i].reachable = false; });
  }
  if (P.regenPerRoom && node.type !== 'rest') P.hp = Math.min(P.maxHp, P.hp + P.regenPerRoom);
  if (node.type === 'combat' || node.type === 'elite' || node.type === 'boss') {
    G.combatNodeIdx = nodeIdx;
    RA.setTheme(node.type === 'boss' ? 'boss' : 'combat');
    initCombat(node.enemyId);
  } else if (node.type === 'rest') {
    G.restNodeIdx = nodeIdx; G.screen = 'rest';
  } else if (node.type === 'shop') {
    setupShop(nodeIdx); G.screen = 'shop';
  } else if (node.type === 'event') {
    setupEvent(nodeIdx); G.screen = 'event';
  }
}

function setupShop(nodeIdx) {
  const available = RD.upgrades.filter(u => {
    if (u.type === 'spell' && u.spell) return ((P.spellStacks && P.spellStacks[u.spell]) || 0) < 3;
    return !P.upgrades.includes(u.id);
  });
  const pool = [...available].sort(() => Math.random() - 0.5).slice(0, 3);
  G.shopItems = pool.map(u => {
    const cost = u.price || (u.rarity==='epic'?100 : u.rarity==='rare'?69 : u.rarity==='uncommon'?44 : 25);
    return { upgrade:u, cost, owned:false };
  });
  G.shopIdx = 0; G.shopNodeIdx = nodeIdx;
}

// ── Events ─────────────────────────────────────────────────────────────────
function setupEvent(nodeIdx) {
  const pool = RD.events;
  G.eventData   = pool[Math.floor(Math.random() * pool.length)];
  G.eventNodeIdx = nodeIdx;
  G.eventSelIdx  = 0;
  G.eventResult  = null; // null = choosing; string = result to display
}

function canAffordOption(opt) {
  if (!opt.cost) return true;
  if (opt.cost.gold  && P.gold < opt.cost.gold) return false;
  if (opt.cost.maxHp && P.maxHp - opt.cost.maxHp < 1) return false;
  return true;
}

function applyEventOption(opt) {
  if (opt.cost && opt.cost.gold)  { P.gold  -= opt.cost.gold; }
  if (opt.cost && opt.cost.maxHp) { P.maxHp -= opt.cost.maxHp; P.hp = Math.min(P.hp, P.maxHp); }
  switch (opt.action) {
    case 'random_upgrade': {
      const available = RD.upgrades.filter(u => u.type !== 'gear' && !P.upgrades.includes(u.id));
      const pick = rnd(available.length ? available : RD.upgrades.filter(u => u.type !== 'gear'));
      if (pick) { applyUpgrade(pick); RA.playUpgradePick(); return 'Received: ' + pick.name; }
      return 'No upgrades available.';
    }
    case 'dark_pact':
      P.dmgMult += 0.5;
      return '+0.5 dmg mult. Max HP reduced by 25.';
    case 'cursed_chest':
      P.gold += 60;
      P.wordSpeedMult = (P.wordSpeedMult || 1.0) * 1.12;
      return '+¢60.  Words now move 12% faster.';
    case 'fountain':
      P.hp = P.maxHp;
      return 'Fully healed to ' + P.maxHp + ' HP.';
    case 'tome':
      P.dmgMult += 0.3;
      return '+0.3 damage multiplier.';
    case 'gamble': {
      const win = Math.random() < 0.5;
      if (win) { P.gold += 80; return 'Fortune favors you!  +¢80 (net +¢40).'; }
      return 'The dice betray you.  ¢40 lost.';
    }
    case 'armory':
      P.maxHp += 30;
      P.hp = Math.min(P.maxHp, P.hp + 15);
      return '+30 max HP,  +15 HP restored.';
    case 'skip':
    default:
      return 'You move on.';
  }
}

// ── Input ──────────────────────────────────────────────────────────────────────
function processKey(key) {
  if (G.screen === 'title') {
    if (key === 'Enter') { G.screen = 'class_select'; RA.startMusic('dungeon'); }
    if (key === 'l' || key === 'L') { darkMode = !darkMode; applyTheme(); }
    if (key === 'i' || key === 'I') { instructionsScroll = 0; G.screen = 'instructions'; }
    if (key === 'a' || key === 'A') { achievementsScroll = 0; G.screen = 'achievements'; }
    if (key === 'g' || key === 'G') { G.screen = 'leaderboard'; fetchLeaderboard(); }
    if (key === 'c' || key === 'C') { codexScroll = 0; G.screen = 'codex'; }
    return;
  }
  if (G.screen === 'codex') {
    const spells = RD.upgrades.filter(u => u.type === 'spell');
    const maxScroll = Math.max(0, spells.length - 6);
    if (key === 'ArrowDown') codexScroll = Math.min(maxScroll, codexScroll + 1);
    if (key === 'ArrowUp')   codexScroll = Math.max(0, codexScroll - 1);
    if (key === 'Escape' || key === 'Enter') { codexScroll = 0; G.screen = paused ? 'combat' : 'title'; }
    return;
  }
  if (G.screen === 'leaderboard') {
    if (key === 'Escape' || key === 'Enter') { G.screen = 'title'; }
    return;
  }
  if (G.screen === 'name_entry') {
    if (nameEntrySubmitting) return;
    if (nameEntryRank !== null || nameEntryError) {
      // already submitted — any key proceeds to run summary
      if (key === 'Enter' || key === 'Escape') { G.screen = 'run_summary'; }
      return;
    }
    if (key === 'Escape') { G.screen = 'run_summary'; return; }
    if (key === 'Enter') { submitScore(); return; }
    if (key === 'Backspace') { nameEntry = nameEntry.slice(0, -1); return; }
    if (key.length === 1 && nameEntry.length < 16) { nameEntry += key; return; }
    return;
  }
  if (G.screen === 'achievements') {
    const maxScroll = Math.max(0, ACHIEVEMENTS.length - ACHIEVEMENTS_PER_PAGE);
    if (key === 'ArrowDown') achievementsScroll = Math.min(maxScroll, achievementsScroll + 1);
    if (key === 'ArrowUp')   achievementsScroll = Math.max(0, achievementsScroll - 1);
    if (key === 'Escape' || key === 'Enter') { achievementsScroll = 0; G.screen = paused ? 'combat' : 'title'; }
    return;
  }
  if (G.screen === 'instructions') {
    const INSTR_PAGE = 22;
    const totalLines = 37; // keep in sync with renderInstructions line count
    const maxScroll = Math.max(0, totalLines - INSTR_PAGE);
    if (key === 'ArrowDown') instructionsScroll = Math.min(maxScroll, instructionsScroll + 1);
    if (key === 'ArrowUp')   instructionsScroll = Math.max(0, instructionsScroll - 1);
    if (key === 'Escape' || key === 'Enter') { instructionsScroll = 0; G.screen = 'title'; }
    return;
  }
  if (G.screen === 'class_select') {
    if (key === 'ArrowLeft') {
      let next = classSelectIdx;
      do { next = (next + CLASS_IDS.length - 1) % CLASS_IDS.length; } while (!unlockedClasses.has(CLASS_IDS[next]) && next !== classSelectIdx);
      classSelectIdx = next; classSelectMsg = '';
    }
    if (key === 'ArrowRight') {
      let next = classSelectIdx;
      do { next = (next + 1) % CLASS_IDS.length; } while (!unlockedClasses.has(CLASS_IDS[next]) && next !== classSelectIdx);
      classSelectIdx = next; classSelectMsg = '';
    }
    // if (key === 's' || key === 'S') stsMode = !stsMode;
    if (key === 'Enter') {
      if (!unlockedClasses.has(CLASS_IDS[classSelectIdx])) {
        const prevId = CLASS_IDS[CLASS_IDS.indexOf(CLASS_IDS[classSelectIdx]) - 1];
        classSelectMsg = 'LOCKED — complete a run as ' + className(prevId) + ' to unlock';
      } else {
        G.screen = 'difficulty_select';
      }
    }
    return;
  }
  if (G.screen === 'difficulty_select') {
    if (key === 'ArrowLeft')  diffIdx = (diffIdx + DIFFICULTIES.length - 1) % DIFFICULTIES.length;
    if (key === 'ArrowRight') diffIdx = (diffIdx + 1) % DIFFICULTIES.length;
    if (key === 'Escape')     { G.screen = 'class_select'; }
    if (key === 'Enter')      startRun(CLASS_IDS[classSelectIdx]);
    return;
  }
  if (G.screen === 'map') {
    if (key === 'ArrowLeft')  mapNavigate(-1);
    if (key === 'ArrowRight') mapNavigate(1);
    if (key === 'Enter') {
      const node = mapNodes[mapSelIdx];
      if (node && node.reachable && !node.cleared) enterNode(mapSelIdx);
    }
    return;
  }
  if (G.screen === 'combat') {
    if (key === 'Escape') { paused = !paused; return; }
    if (paused) {
      if (key === 'm' || key === 'M') RA.toggleMute();
      if (key === 'l' || key === 'L') { darkMode = !darkMode; applyTheme(); }
      if (key === 'a' || key === 'A') { achievementsScroll = 0; G.screen = 'achievements'; return; }
      if (key === 'c' || key === 'C') { codexScroll = 0; G.screen = 'codex'; return; }
      if (key === 'q' || key === 'Q') { paused = false; RA.stopMusic(1); G.screen = 'title'; }
      return;
    }
    if (P.spells && P.spells.length > 0) {
      const si = parseInt(key) - 1;
      if (si >= 0 && si < P.spells.length) { activateSpell(si); return; }
    }
    if (key === 'Backspace') { typed = typed.slice(0, -1); updateActiveWord(); return; }
    if (key.length !== 1) return;
    const nextTyped = typed + key;
    if (P.spells) {
      const si = P.spells.findIndex(s => s === nextTyped);
      if (si >= 0) { activateSpell(si); typed = ''; activeWordIdx = -1; return; }
    }
    const match = words.find(w => w.text.startsWith(nextTyped));
    if (match) {
      typed = nextTyped; RA.playKeyCorrect(); updateActiveWord();
      RunStats.totalKeys++; RunStats.correctKeys++;
      if (match.text === typed) destroyWord(words.indexOf(match));
    } else {
      RA.playKeyWrong();
      typed = '';
      const single = words.find(w => w.text.startsWith(key));
      RunStats.totalKeys++;
      if (single) { typed = key; RunStats.correctKeys++; updateActiveWord(); if (single.text === typed) destroyWord(words.indexOf(single)); }
      else { activeWordIdx = -1; }
    }
    return;
  }
  if (G.screen === 'upgrade' || G.screen === 'combat_result') {
    if (!upgradeChosen && G.screen === 'upgrade') {
      if (key === 'ArrowUp'   || key === 'ArrowLeft')  upgradeSelIdx = (upgradeSelIdx + upgradeOptions.length - 1) % upgradeOptions.length;
      if (key === 'ArrowDown' || key === 'ArrowRight') upgradeSelIdx = (upgradeSelIdx + 1) % upgradeOptions.length;
      const numKey = parseInt(key) - 1;
      if (numKey >= 0 && numKey < upgradeOptions.length) upgradeSelIdx = numKey;
      if (key === 'Enter' || (numKey >= 0 && numKey < upgradeOptions.length)) {
        applyUpgrade(upgradeOptions[upgradeSelIdx]); upgradeChosen = true; RA.playUpgradePick();
        setTimeout(() => { RA.setTheme('dungeon'); G.screen = 'map'; }, 700);
      }
    } else if (G.screen === 'combat_result' && key === 'Enter') {
      buildMap(); RA.setTheme('dungeon'); G.screen = 'map';
    }
    return;
  }
  if (G.screen === 'shop') {
    if (key === 'Escape') {
      mapNodes[G.shopNodeIdx].cleared = true;
      (G.mapAdj[G.shopNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
      mapSelIdx = (G.mapAdj[G.shopNodeIdx] || [])[0] || 0;
      G.screen = 'map'; return;
    }
    if (key === 'ArrowUp')   G.shopIdx = Math.max(0, (G.shopIdx||0) - 1);
    if (key === 'ArrowDown') G.shopIdx = Math.min((G.shopItems||[]).length-1, (G.shopIdx||0) + 1);
    if (key === 'Enter') {
      const item = (G.shopItems||[])[(G.shopIdx||0)];
      if (item && P.gold >= item.cost && !item.owned) {
        P.gold -= item.cost; applyUpgrade(item.upgrade); item.owned = true; RA.playUpgradePick();
      }
    }
    return;
  }
  if (G.screen === 'rest') {
    if (key === 'Enter') {
      P.hp = Math.min(P.maxHp, P.hp + Math.floor(P.maxHp * 0.35));
      mapNodes[G.restNodeIdx].cleared = true;
      (G.mapAdj[G.restNodeIdx]||[]).forEach(i => { mapNodes[i].reachable = true; });
      mapSelIdx = (G.mapAdj[G.restNodeIdx]||[])[0] || 0;
      G.screen = 'map';
    }
    return;
  }
  if (G.screen === 'event') {
    const ev = G.eventData;
    if (!ev) return;
    function leaveEvent() {
      mapNodes[G.eventNodeIdx].cleared = true;
      (G.mapAdj[G.eventNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
      mapSelIdx = (G.mapAdj[G.eventNodeIdx] || [])[0] || 0;
      G.screen = 'map';
    }
    if (G.eventResult !== null) {
      if (key === 'Enter' || key === 'Escape') leaveEvent();
      return;
    }
    const opts = ev.options || [];
    if (key === 'ArrowUp')   G.eventSelIdx = Math.max(0, G.eventSelIdx - 1);
    if (key === 'ArrowDown') G.eventSelIdx = Math.min(opts.length - 1, G.eventSelIdx + 1);
    const numKey = parseInt(key) - 1;
    if (!isNaN(numKey) && numKey >= 0 && numKey < opts.length) G.eventSelIdx = numKey;
    if (key === 'Enter') {
      const opt = opts[G.eventSelIdx];
      if (opt && canAffordOption(opt)) G.eventResult = applyEventOption(opt);
    }
    if (key === 'Escape') G.eventResult = applyEventOption({ action: 'skip' });
    return;
  }
  if (G.screen === 'run_summary' || G.screen === 'gameover' || G.screen === 'victory') {
    if (key === 'ArrowDown') runSummaryScroll++;
    if (key === 'ArrowUp')   runSummaryScroll = Math.max(0, runSummaryScroll - 1);
    if (key === 'Enter') { runSummaryScroll = 0; G.screen = 'title'; }
    return;
  }
}

function renderMap() {
  const COLS = 78, ROWS = G.mapRows || 16;
  const grid   = Array.from({length:ROWS}, () => new Array(COLS).fill(' '));
  const colors = Array.from({length:ROWS}, () => new Array(COLS).fill(''));

  function put(r, c, text, color) {
    for (let i = 0; i < text.length && c+i < COLS && r < ROWS; i++) {
      grid[r][c+i] = text[i]; colors[r][c+i] = color || '';
    }
  }

  const colChar = [8, 37, 66];
  const rowChar = G.mapRowChar || [0, 3, 6, 9, 12];
  function np(node) { return { r:rowChar[node.row], c:colChar[node.col] }; }

  // Corridors
  Object.entries(G.mapAdj || {}).forEach(([from, tos]) => {
    const fp = np(mapNodes[+from]);
    tos.forEach(toIdx => {
      const tp = np(mapNodes[toIdx]);
      const dr = tp.r - fp.r, dc = tp.c - fp.c;
      const ch = dc === 0 ? '|' : dc > 0 ? '\\' : '/';
      for (let s = 1; s < Math.abs(dr); s++) {
        const r = fp.r + s, c = Math.round(fp.c + dc * s / Math.abs(dr));
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) { grid[r][c] = ch; colors[r][c] = C.txt; }
      }
    });
  });

  // Nodes
  mapNodes.forEach((node, i) => {
    const meta = ROOM_TYPE_META[node.type] || ROOM_TYPE_META.combat;
    const p = np(node);
    const isSelected  = i === mapSelIdx;
    const isCleared   = node.cleared;
    const isReachable = node.reachable && !node.cleared;
    const iconCol  = isCleared ? C.dim : isSelected ? C.white : isReachable ? meta.color : C.dim;
    const labelCol = isCleared ? C.dim : isSelected ? C.white : isReachable ? C.hi       : C.dim;
    const icon = isSelected ? '[' + meta.icon + ']' : ' ' + meta.icon + ' ';
    put(p.r, p.c - 1, icon, iconCol);
    const lbl = meta.label.toUpperCase();
    put(p.r + 1, p.c - Math.floor(lbl.length / 2), lbl, labelCol);
  });

  // Render grid
  const htmlLines = grid.map((row, r) => {
    let line = '', curCol = '', run = '';
    const flush = () => {
      if (!run) return;
      const e = run.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      line += curCol ? `<span style="color:${curCol}">${e}</span>` : e;
      run = '';
    };
    row.forEach((ch, c) => {
      const col = colors[r][c];
      if (col !== curCol) { flush(); curCol = col; }
      run += ch;
    });
    flush();
    return line;
  });

  const hpStr = sp('HP ' + P.hp + '/' + P.maxHp, P.hp < P.maxHp*0.3 ? C.red : C.txt);
  screen.innerHTML =
    wh('FLOOR ' + (P.floor||1)) + '                            ' + dim('DUNGEON MAP') + '             ' + hpStr + '\n' +
    dim('─'.repeat(78)) + '\n' +
    htmlLines.join('\n') + '\n' +
    dim('─'.repeat(78)) + '\n' +
    dim('<- -> navigate    ENTER enter room') +
    (P.spells && P.spells.length ? '    ' + dim('spells: ' + P.spells.join(' ')) : '');
  clear();
}

function renderCombat() {
  const etype = enemy.type === 'boss' ? ' [BOSS]' : enemy.type === 'elite' ? ' [ELITE]' : '';
  const cursor = Math.floor(combatTick / 400) % 2 === 0 ? '_' : ' ';

  const spellStr = P.spells && P.spells.length > 0
    ? '\n' + P.spells.map((s, i) => {
        const cd = P.spellCDs[i] || 0;
        const lv = (P.spellStacks && P.spellStacks[s] > 1) ? ' Lv' + P.spellStacks[s] : '';
        return sp('[' + (i+1) + ']' + s + lv + (cd > 0 ? ' '+(cd/1000).toFixed(1)+'s' : ''), cd > 0 ? C.dim : C.txt);
      }).join('   ')
    : '';

  const shieldStr = P.shield > 0 ? '  ' + sp('[shld:' + P.shield + ']', C.blue) : '';

  const dispComboMult = comboCount >= 10 ? 2.0 : comboCount >= 6 ? 1.5 : comboCount >= 3 ? 1.25 : 1.0;
  const comboStr = comboCount >= 3
    ? '\n' + sp('COMBO x' + comboCount + '  ×' + dispComboMult.toFixed(2) + ' dmg', C.gold)
    : '';

  const statusItems = [];
  if (freezeTimer > 0) statusItems.push(sp('FROZEN', C.blue));
  if (slowTimer   > 0) statusItems.push(sp('SLOW',   C.blue));
  if (hasteTimer  > 0) statusItems.push(sp('HASTE',  C.gold));
  if (wardTimer   > 0) statusItems.push(sp('WARD',   C.blue));
  if (leechTimer  > 0) statusItems.push(sp('LEECH',  C.cyan));
  if (chainCount  > 0) statusItems.push(sp('CHAIN×' + chainCount, C.gold));
  if (reaveActive)     statusItems.push(sp('REAVE',  C.hi));
  if (markedWordText)  statusItems.push(sp('MARK',   C.gold));
  const statusStr = statusItems.length > 0 ? '\n' + statusItems.join('  ') : '';
  const activeLines = (statusItems.length > 0 ? 1 : 0) + (comboCount >= 3 ? 1 : 0);

  let html =
    sp(enemy.name.toUpperCase() + etype, enemy.color || C.red) +
    (enemy.currentPhase > 0 ? '  ' + sp('PHASE '+(enemy.currentPhase+1), '#993366') : '') +
    '                    ' + dim('FLOOR ' + P.floor) + '\n' +
    bar(enemy.hp, enemy.maxHp) +
    statusStr +
    comboStr +
    '\n'.repeat(Math.max(1, 15 - activeLines)) +
    dim('─'.repeat(78)) + '\n' +
    bar(P.hp, P.maxHp, P.classId.toUpperCase()) + shieldStr +
    '      ' + sp('¢' + P.gold, C.gold) +
    '      ' + dim('dmg:' + P.dmgMult.toFixed(1) + 'x') +
    spellStr + '\n' +
    sp('> ', C.dim) + wh(esc(typed) + cursor);

  if (flashTimer > 0) html += '\n\n' + sp(flashMsg, flashColor);
  if (achievementBanner && achievementBanner.timer > 0) html += '\n' + sp('★ ' + achievementBanner.name + ' ★', C.gold);
  if (paused) html += '\n\n' + wh('[ PAUSED ]') + '    ' + dim('ESC resume  M mute  L theme  A achievements  C codex  Q quit');

  screen.innerHTML = html;

  // Portrait
  if (enemy.portrait) {
    portraitLayer.innerHTML = `<span style="color:${C.dim}">${enemy.portrait.join('\n')}</span>`;
  }

  // Words
  let wHtml = '';
  words.forEach((w, i) => {
    if (w.invisible && w.invisBlinkTimer > 0 && Math.floor(w.invisBlinkTimer / 200) % 2 === 0) return;
    const isActive = i === activeWordIdx;
    const txt = w.text;
    const tLen = isActive ? typed.length : 0;
    let inner = '';

    if (w.isPickup) {
      const eff = w.pickupEffect;
      const blink = Math.floor(Date.now() / 400) % 2 === 0;
      inner = tLen > 0
        ? sp(txt.slice(0,tLen), C.white) + sp(txt.slice(tLen), C.dim)
        : sp(txt, isActive ? C.white : (blink ? eff.color : C.dim));
      inner += '<br>' + sp(eff.label, eff.color);
    } else if (tLen > 0) {
      const restColor = w.isAttack ? C.red : w.marked ? C.gold : C.dim;
      inner = sp(txt.slice(0,tLen), C.white) + sp(txt.slice(tLen), restColor);
    } else {
      const baseColor = w.isAttack ? C.red : w.marked ? C.gold : isActive ? C.hi : C.txt;
      inner = sp(txt, baseColor);
    }

    wHtml += `<span class="w" style="left:${w.x}px;top:${w.y}px">${inner}</span>`;
  });
  wordLayer.innerHTML = wHtml;

  // Floats
  let fHtml = '';
  floats.forEach(f => {
    fHtml += `<span class="fl" style="left:${f.x}px;top:${f.y}px;opacity:${f.life.toFixed(2)};color:${f.color}">${esc(f.str)}</span>`;
  });
  floatLayer.innerHTML = fHtml;
}

function renderUpgrade() {
  const lines = ['', wh('   ROOM CLEARED!'), dim('   choose an upgrade'), dim('   ' + '─'.repeat(40)), ''];
  upgradeOptions.forEach((u, i) => {
    const sel = !upgradeChosen && i === upgradeSelIdx;
    const rarCol = RD.rarityColor[u.rarity] || C.txt;
    const typeIcon = { passive:'=', spell:'*', deck:'~', gear:'+' }[u.type] || '?';
    const prefix = sel ? '>' : ' ';
    lines.push(sp(prefix + ' [' + (i+1) + '] ' + typeIcon + ' ' + u.name, sel ? C.white : rarCol));
    lines.push(dim('      ' + u.rarity + ' ' + u.type));
    lines.push(sp('      ' + u.desc, sel ? C.txt : C.dim));
    lines.push('');
  });
  lines.push(!upgradeChosen ? dim('   ^ v navigate    ENTER confirm    1 2 3 shortcut') : sp('   ...', C.gold));
  lines.push('');
  lines.push(dim('   ' + '─'.repeat(40)));
  lines.push(bar(P.hp, P.maxHp, P.classId.toUpperCase()) + '   ' + sp('¢' + P.gold, C.gold) + '   ' + dim('dmg:' + P.dmgMult.toFixed(1) + 'x') + (P.shield > 0 ? '   ' + sp('shld:' + P.shield, C.blue) : ''));
  screen.innerHTML = lines.join('\n');
  clear();
}

function renderCombatResult() {
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  screen.innerHTML = [
    '', '', '', '',
    wh('   BOSS DEFEATED!'),
    dim('   floor ' + ((P.floor||1)-1) + ' cleared'),
    dim('   ' + '─'.repeat(24)),
    '',
    sp('   hp:       ' + P.hp + ' / ' + P.maxHp, P.hp < P.maxHp*0.3 ? C.red : C.txt),
    sp('   gold:     ¢' + P.gold, C.gold),
    P.upgrades && P.upgrades.length ? dim('   upgrades: ' + P.upgrades.length) : '',
    '', '',
    blink ? dim('   ENTER -> next floor') : '',
  ].join('\n');
  clear();
}

function renderShop() {
  const lines = ['', wh('   SHOP'), sp('   ¢' + P.gold, C.gold), dim('   ' + '─'.repeat(40)), ''];
  (G.shopItems || []).forEach((item, i) => {
    const u = item.upgrade;
    const sel = i === (G.shopIdx||0);
    const canBuy = P.gold >= item.cost && !item.owned;
    const rarCol = RD.rarityColor[u.rarity] || C.txt;
    const prefix = sel ? '> ' : '  ';
    const costStr = item.owned ? dim('OWNED') : sp('¢' + item.cost, canBuy ? C.gold : C.red);
    lines.push(sp(prefix + u.name, item.owned ? C.dim : C.white) + '    ' + costStr);
    lines.push(dim('  ' + u.rarity + ' · ' + u.type));
    lines.push(sp('  ' + u.desc, C.dim));
    lines.push('');
  });
  lines.push(dim('   ^ v navigate  ENTER buy  ESC leave'));
  screen.innerHTML = lines.join('\n');
  clear();
}

function renderRest() {
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  const heal = Math.floor(P.maxHp * 0.35);
  screen.innerHTML = [
    '', '', '', '',
    sp('   + REST SITE +', C.cyan),
    dim('   a moment of respite in the dungeon'),
    dim('   ' + '─'.repeat(30)),
    '',
    sp('   heal ' + heal + ' hp  (' + P.hp + ' -> ' + Math.min(P.maxHp, P.hp+heal) + ')', C.txt),
    dim('   max hp: ' + P.maxHp),
    '', '',
    blink ? dim('   PRESS ENTER TO REST') : '',
  ].join('\n');
  clear();
}

function renderEvent() {
  const ev = G.eventData;
  if (!ev) return;
  const opts = ev.options || [];
  const lines = [
    '',
    sp('   ? ' + ev.title, C.gold),
    dim('   ' + '─'.repeat(40)),
    '',
    sp('   ' + ev.desc, C.txt),
    '',
  ];
  if (G.eventResult !== null) {
    lines.push(sp('   >> ' + G.eventResult, C.cyan));
    lines.push('');
    lines.push(dim('   ENTER to continue'));
  } else {
    opts.forEach((opt, i) => {
      const sel = i === G.eventSelIdx;
      const afford = canAffordOption(opt);
      const prefix = sel ? '> ' : '  ';
      let costStr = '';
      if (opt.cost) {
        const parts = [];
        if (opt.cost.gold)  parts.push('¢' + opt.cost.gold);
        if (opt.cost.maxHp) parts.push('-' + opt.cost.maxHp + ' max HP');
        costStr = sp('  [' + parts.join('  ') + ']', afford ? C.gold : C.red);
      }
      lines.push(sp(prefix + '[' + (i+1) + '] ' + opt.label, afford ? (sel ? C.white : C.txt) : C.dim) + costStr);
    });
    lines.push('');
    lines.push(dim('   ^ v · 1-' + opts.length + ' select    ENTER confirm    ESC skip'));
    lines.push('');
    lines.push(dim('   ¢' + P.gold + '  hp ' + P.hp + '/' + P.maxHp));
  }
  screen.innerHTML = lines.join('\n');
  clear();
}

let achievementsScroll = 0;
let runSummaryScroll = 0;
const ACHIEVEMENTS_PER_PAGE = 5;

function renderAchievements() {
  const total = ACHIEVEMENTS.length;
  const earned = earnedAchievements.size;
  const maxScroll = Math.max(0, total - ACHIEVEMENTS_PER_PAGE);
  const visible = ACHIEVEMENTS.slice(achievementsScroll, achievementsScroll + ACHIEVEMENTS_PER_PAGE);
  const canUp = achievementsScroll > 0;
  const canDown = achievementsScroll < maxScroll;
  const lines = [
    '',
    wh('   ACHIEVEMENTS') + '                          ' + dim(earned + ' / ' + total + ' unlocked'),
    dim('   ' + '─'.repeat(40)),
    '',
    canUp ? dim('   ↑') : '',
  ];
  visible.forEach(a => {
    const done = earnedAchievements.has(a.id);
    lines.push((done ? sp('   ★ ', C.gold) : dim('   · ')) + (done ? wh(a.name) : dim(a.name)));
    lines.push(dim('     ' + (done ? a.desc : '???')));
    lines.push('');
  });
  lines.push(canDown ? dim('   ↓') : '');
  lines.push('');
  lines.push(dim('   ↑ ↓ scroll    ESC back'));
  screen.innerHTML = lines.join('\n');
  clear();
}

function renderGameOver() {
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  screen.innerHTML = [
    '', '', '',
    sp('   DEFEATED', C.red),
    dim('   ' + '─'.repeat(18)),
    '',
    dim('   slain by ' + (enemy ? enemy.name : 'the dungeon')),
    dim('   floor ' + (P.floor||1)),
    sp('   gold: ¢' + (P.gold||0), C.gold),
    P.upgrades && P.upgrades.length ? dim('   upgrades: ' + P.upgrades.length) : '',
    '', '',
    blink ? dim('   PRESS ENTER TO RETURN') : '',
  ].join('\n');
  clear();
}

function renderVictory() {
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  screen.innerHTML = [
    '', '',
    wh('   TYRANT PRIME'),
    wh('   DEFEATED!'),
    dim('   ' + '─'.repeat(22)),
    '',
    dim('   the dungeon has been conquered'),
    '',
    dim('   class:    ' + (P.classId||'').toUpperCase()),
    sp('   hp:       ' + P.hp + '/' + P.maxHp, P.hp < P.maxHp*0.3 ? C.red : C.txt),
    sp('   gold:     ¢' + P.gold, C.gold),
    dim('   upgrades: ' + (P.upgrades||[]).length),
    '', '',
    blink ? wh('   PRESS ENTER TO PLAY AGAIN') : '',
  ].join('\n');
  clear();
}

function renderCodex() {
  const spells = RD.upgrades.filter(u => u.type === 'spell');
  const visible = spells.slice(codexScroll, codexScroll + 6);
  const lines = [
    '',
    wh('   SPELL CODEX') + '   ' + dim((codexScroll + 1) + '–' + Math.min(codexScroll + 6, spells.length) + ' of ' + spells.length),
    dim('   spells can be acquired up to Lv3  ·  Lv2 = ×1.5 effect  ·  Lv3 = ×2.0 effect'),
    dim('   ' + '─'.repeat(70)),
    '',
  ];
  visible.forEach(u => {
    const rarCol = RD.rarityColor[u.rarity] || C.txt;
    const cdSec = (u.cd / 1000).toFixed(0) + 's';
    lines.push(sp('   ' + u.name, rarCol) + '   ' + dim(u.rarity + '  ·  CD: ' + cdSec));
    lines.push('   ' + sp(u.desc.replace(/\s*\(CD:[^)]+\)/, ''), C.txt));
    lines.push('');
  });
  while (lines.length < 20) lines.push('');
  lines.push(dim('   ' + '─'.repeat(70)));
  lines.push(dim('   ^ v scroll    ESC back'));
  screen.innerHTML = lines.join('\n');
  clear();
}

function renderNameEntry() {
  const score = calcScore();
  const diffId = DIFFICULTIES[diffIdx] ? DIFFICULTIES[diffIdx].id : 'normal';
  const diffName = diffId.charAt(0).toUpperCase() + diffId.slice(1);
  const outcome = G.runOutcome === 'victory' ? sp('VICTORY', C.gold) : sp('DEFEATED', C.red);
  const cursor = Math.floor(Date.now() / 400) % 2 === 0 ? '_' : ' ';
  const lines = [
    '', '',
    '   ' + outcome + '   ' + dim('score: ' + score.toLocaleString() + '  ·  ' + diffName + '  ·  floor ' + Math.min(P.floor||1,3)),
    '',
    wh('   enter your name for the leaderboard'),
    dim('   (up to 16 characters)'),
    '',
  ];
  if (nameEntryRank !== null) {
    lines.push(sp('   submitted!  global rank: #' + nameEntryRank, C.gold));
    lines.push('');
    lines.push(dim('   ENTER to continue'));
  } else if (nameEntryError) {
    lines.push(sp('   ' + nameEntryError, C.red));
    lines.push('');
    lines.push(dim('   ENTER retry   ESC skip'));
  } else if (nameEntrySubmitting) {
    lines.push(dim('   submitting...'));
  } else {
    lines.push('   ' + sp('> ', C.dim) + wh(esc(nameEntry) + cursor));
    lines.push('');
    lines.push(dim('   ENTER submit   ESC skip without submitting'));
  }
  screen.innerHTML = lines.join('\n');
  clear();
}

function renderLeaderboard() {
  const lines = ['', wh('   GLOBAL RANKINGS'), dim('   trinacria.ddns.net'), dim('   ' + '─'.repeat(60)), ''];
  if (lbLoading) {
    lines.push(dim('   loading...'));
  } else if (lbError) {
    lines.push(sp('   ' + lbError, C.red));
  } else if (!lbData || lbData.length === 0) {
    lines.push(dim('   no scores yet — be the first!'));
  } else {
    lines.push(dim('   # ' + '  NAME                SCORE      CLASS     DIFF    FLOOR'));
    lines.push(dim('   ' + '─'.repeat(60)));
    lbData.forEach((e, i) => {
      const rank  = String(i + 1).padEnd(2);
      const name  = e.name.padEnd(20);
      const score = String(e.score.toLocaleString()).padEnd(10);
      const cls   = e.class.padEnd(9);
      const diff  = e.difficulty.padEnd(7);
      const floor = 'F' + e.floor + (e.outcome === 'victory' ? '✓' : ' ');
      const col   = i === 0 ? C.gold : i < 3 ? C.hi : C.txt;
      lines.push(sp('   ' + rank + ' ' + name + score + cls + diff + floor, col));
    });
  }
  lines.push('');
  lines.push(dim('   ' + '─'.repeat(60)));
  lines.push(dim('   ESC back'));
  screen.innerHTML = lines.join('\n');
  clear();
}

function renderRunSummary() {
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  const isVictory = G.runOutcome === 'victory';
  const elapsed = Math.max(0, Math.round(((RunStats.endTime || Date.now()) - (RunStats.startTime || Date.now())) / 1000));
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const timeStr = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
  const accuracy = RunStats.totalKeys > 0
    ? Math.round((RunStats.correctKeys / RunStats.totalKeys) * 100) + '%'
    : 'n/a';
  const newAchs = RunStats.newAchievements || [];
  const allLines = [
    '', '',
    isVictory ? wh('   TYRANT PRIME DEFEATED!') : sp('   DEFEATED', C.red),
    isVictory
      ? dim('   the dungeon has been conquered')
      : dim('   slain by ' + (enemy ? enemy.name : 'the dungeon')),
    dim('   ' + '─'.repeat(30)),
    '',
    dim('   class:        ' + (P.classId||'').toUpperCase()),
    dim('   difficulty:   ' + DIFFICULTIES[diffIdx].id),
    dim('   floor:        ' + (P.floor||1)),
    dim('   kills:        ' + (P.kills||0)),
    sp('   gold:         ¢' + (P.gold||0), C.gold),
    (P.upgrades||[]).length ? dim('   upgrades:     ' + (P.upgrades||[]).length) : '',
    '',
    dim('   ── run stats ────────────────'),
    dim('   words typed:  ' + RunStats.wordsDestroyed),
    dim('   damage dealt: ' + RunStats.dmgDealt),
    dim('   accuracy:     ' + accuracy),
    dim('   time:         ' + timeStr),
    ...(newAchs.length > 0 ? [
      '',
      dim('   ── achievements unlocked ───────────'),
      ...newAchs.map(a => sp('   ★ ' + a.name, C.gold)),
    ] : []),
  ];
  const PAGE = 18;
  const maxScroll = Math.max(0, allLines.length - PAGE);
  runSummaryScroll = Math.min(runSummaryScroll, maxScroll);
  const canUp = runSummaryScroll > 0;
  const canDown = runSummaryScroll < maxScroll;
  const visible = allLines.slice(runSummaryScroll, runSummaryScroll + PAGE);
  screen.innerHTML = [
    canUp ? dim('   ↑') : '',
    ...visible,
    canDown ? dim('   ↓') : '',
    '',
    blink ? dim('   ENTER to return' + (canUp || canDown ? '    ↑ ↓ scroll' : '')) : '',
  ].join('\n');
  clear();
}

function renderDifficultySelect() {
  const d = DIFFICULTIES[diffIdx];
  const tabs = DIFFICULTIES.map((df, i) =>
    i === diffIdx ? wh('[ ' + df.label + ' ]') : dim('  ' + df.label + '  ')
  ).join('   ');
  const desc = {
    beginner: 'slower words  ·  lower enemy hp  ·  more gold  ·  great for new players',
    normal:   'the intended experience',
    hard:     'faster words  ·  tougher enemies  ·  less gold  ·  no mercy',
  };
  screen.innerHTML = [
    '',
    wh('   CHOOSE DIFFICULTY'),
    dim('   ' + '─'.repeat(40)),
    '',
    '   ' + tabs,
    '',
    dim('   ' + '─'.repeat(40)),
    '',
    dim('   ' + desc[d.id]),
    '', '', '',
    dim('   ESC back    <- -> select    ENTER begin'),
  ].join('\n');
  clear();
}

function renderInstructions() {
  const INSTR_PAGE = 22;
  const all = [
    wh('   HOW TO PLAY'),
    dim('   ' + '─'.repeat(40)),
    '',
    wh('   combat'),
    dim('   type the words drifting across the screen to deal damage'),
    dim('   longer words = more damage'),
    dim('   red words are enemy attacks — type them to block'),
    dim('   symbols (!@#$%) are pickups — type them for bonuses'),
    '',
    wh('   spells'),
    dim('   press 1-3 to cast a spell (if you have one)'),
    dim('   acquiring the same spell again raises its level (max Lv3)'),
    dim('   freeze  — stops all words for 3s'),
    dim('   shield  — absorbs incoming damage'),
    dim('   nova    — damages enemy for each word on screen'),
    dim('   haste   — slows words 40% for 5s'),
    dim('   drain   — deals damage and heals you'),
    dim('   blast   — heavy single hit'),
    dim('   echo    — repeat last destroyed word\'s damage for free'),
    dim('   slow    — words crawl at 20% speed for 4s'),
    dim('   reave   — next word deals 3× damage'),
    dim('   ward    — block all enemy attacks for 5s'),
    dim('   mark    — highlight one word; destroying it deals 5× dmg'),
    dim('   leech   — heal 1 HP per letter typed for 10s'),
    dim('   volley  — instantly destroy 3 shortest words'),
    dim('   chain   — next 5 words deal +50% damage'),
    dim('   smite   — deal 8 × current combo as flat damage'),
    '',
    wh('   combo'),
    dim('   destroy words in quick succession to build a multiplier'),
    dim('   ×1.25 at x3  ·  ×1.50 at x6  ·  ×2.00 at x10'),
    dim('   taking damage resets the combo'),
    '',
    wh('   map'),
    dim('   <- -> navigate nodes,  ENTER to enter'),
    dim('   combat → elite → boss per floor  (3 floors total)'),
    dim('   ? event nodes: random encounters with choices and consequences'),
    dim('   shop: spend gold on upgrades and gear'),
    dim('   rest: restore 35% hp'),
    dim('   normal: 2 branches  ·  hard: 3 branches'),
  ]; // 37 lines — keep totalLines in processKey in sync
  const visible = all.slice(instructionsScroll, instructionsScroll + INSTR_PAGE);
  const atBottom = instructionsScroll + INSTR_PAGE >= all.length;
  screen.innerHTML = ['', ...visible, '', dim('   ' + '─'.repeat(40)), dim('   ^ v scroll    ESC close' + (atBottom ? '' : '  (more below)'))].join('\n');
  clear();
}

// ── Main loop ──────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(t) {
  const dt = Math.min(t - lastT, 50);
  lastT = t;
  switch (G.screen) {
    case 'title':         renderTitle();         break;
    case 'instructions':  renderInstructions();  break;
    case 'class_select':      renderClassSelect();      break;
    case 'difficulty_select': renderDifficultySelect(); break;
    case 'map':           renderMap();            break;
    case 'combat':        updateCombat(dt); renderCombat(); break;
    case 'upgrade':       renderUpgrade();        break;
    case 'combat_result': renderCombatResult();   break;
    case 'shop':          renderShop();           break;
    case 'rest':          renderRest();           break;
    case 'event':         renderEvent();          break;
    case 'codex':         renderCodex();          break;
    case 'name_entry':    renderNameEntry();      break;
    case 'leaderboard':   renderLeaderboard();    break;
    case 'run_summary':   renderRunSummary();     break;
    case 'achievements':  renderAchievements();   break;
    case 'gameover':      renderGameOver();       break;
    case 'victory':       renderVictory();        break;
  }
  requestAnimationFrame(loop);
}

applyTheme();

window.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Backspace'].includes(e.key))
    e.preventDefault();
  processKey(e.key);
});

requestAnimationFrame(loop);
</script>
