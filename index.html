<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYPEROGUE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#ffffff;
      display:flex; justify-content:center; align-items:center;
      height:100vh; overflow:hidden;
      font-family:'Space Mono','Courier New',monospace;
    }
    canvas { display:block; image-rendering:pixelated; border:1px solid #ddd; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script src="words.js"></script>
<script src="rogue-audio.js"></script>
<script src="rogue-data.js"></script>
<script>
'use strict';

// ── Canvas ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const cx = canvas.getContext('2d');
const W = 800, H = 520;
canvas.width = W; canvas.height = H;

// Scale to fit viewport
function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H, 1.6);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize); resize();

// ── Constants ──────────────────────────────────────────────────────────────────
const FONT     = "bold 15px 'Space Mono','Courier New',monospace";
const FONT_SM  = "11px 'Space Mono','Courier New',monospace";
const FONT_LG  = "bold 22px 'Space Mono','Courier New',monospace";
const FONT_XL  = "bold 32px 'Space Mono','Courier New',monospace";

// Combat room bounds
const RM = { x:30, y:50, w:740, h:390 };   // outer room rect
const WALL = 28;                             // wall thickness
const FLOOR_X1 = RM.x + WALL;
const FLOOR_Y1 = RM.y + WALL;
const FLOOR_X2 = RM.x + RM.w - WALL;
const FLOOR_Y2 = RM.y + RM.h - WALL;
const FLOOR_W  = FLOOR_X2 - FLOOR_X1;
const FLOOR_H  = FLOOR_Y2 - FLOOR_Y1;

const ENEMY_CX  = W / 2;
const ENEMY_CY  = FLOOR_Y1 + 58;
const PLAYER_CX = W / 2;
const PLAYER_CY = FLOOR_Y2 - 58;

const WORD_SPAWN_Y = ENEMY_CY  + 48;
const WORD_EXIT_Y  = PLAYER_CY - 40;

const LANE_X = [FLOOR_X1 + 95, W / 2, FLOOR_X2 - 95];

const TILE = 36; // floor tile size

const RD = window.ROGUE_DATA;
const RA = window.ROGUE_AUDIO;

// ── State ──────────────────────────────────────────────────────────────────────
let G = { screen:'title' };

// Title screen
let titleTick = 0;
let titleParticles = [];

// Class select
let classSelectIdx = 0;
const CLASS_IDS = ['warrior', 'rogue', 'mage'];

// Map
let mapNodes = [], mapCurIdx = 0, mapSelIdx = 0;

// Combat
let words = [], typed = '', activeWordIdx = -1;
let enemy = null, enemyPhase = 0;
let combatTick = 0, spawnTimer = 0, attackTimer = 0;
let freezeTimer = 0, hasteTimer = 0, flashTimer = 0;
let flashMsg = '', flashColor = '#fff';
let scrambleTimer = 0;
let invisWordCount = 0;

// Player
let P = {};

// Upgrade
let upgradeOptions = [], upgradeChosen = false;

// Particles / floats
let particles = [], floats = [];

// Pause
let paused = false;

// ── Dungeon floor tile seeding ─────────────────────────────────────────────────
// Pre-generate tile shading so it's consistent each frame
let tileShade = [];
for (let ty = 0; ty < 20; ty++) {
  tileShade[ty] = [];
  for (let tx = 0; tx < 25; tx++) {
    tileShade[ty][tx] = Math.random() * 0.06;
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function pickWord() {
  const tiers = window.TYPERUN_WORDS.tiers;
  const e = enemy;
  let pool = [];
  (e.wordTiers || [0,1]).forEach(t => pool.push(...tiers[t]));
  // Deck manipulation
  if (P.upgrades && P.upgrades.includes('dk_purge'))
    pool = pool.filter(w => w.length < 10);
  if (P.upgrades && P.upgrades.includes('dk_inject'))
    pool = pool.concat(RD.powerWords);
  if (P.upgrades && P.upgrades.includes('dk_chaos'))
    pool = pool.filter(w => w.length >= 5);
  // deduplicate against on-screen words
  const onScreen = new Set(words.map(w => w.text));
  const fresh = pool.filter(w => !onScreen.has(w));
  return rnd(fresh.length ? fresh : pool) || 'bash';
}

// ── Drawing primitives ─────────────────────────────────────────────────────────
function rect(x, y, w, h, fill, stroke, lw) {
  cx.fillStyle = fill || 'transparent';
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = lw || 1; }
  cx.beginPath(); cx.rect(x, y, w, h);
  if (fill) cx.fill();
  if (stroke) cx.stroke();
}

function roundRect(x, y, w, h, r, fill, stroke, lw) {
  cx.beginPath();
  cx.roundRect(x, y, w, h, r);
  if (fill) { cx.fillStyle = fill; cx.fill(); }
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = lw || 1; cx.stroke(); }
}

function text(str, x, y, color, font, align) {
  cx.fillStyle = color || '#fff';
  cx.font = font || FONT;
  cx.textAlign = align || 'left';
  cx.fillText(str, x, y);
}

function hpBar(x, y, w, h, hp, maxHp, color) {
  roundRect(x, y, w, h, 3, '#ddddee');
  const pct = clamp(hp / maxHp, 0, 1);
  if (pct > 0) roundRect(x, y, w * pct, h, 3, color);
  roundRect(x, y, w, h, 3, null, '#aaaacc', 1);
}

// ── Dungeon room drawing ───────────────────────────────────────────────────────
function drawDungeonRoom() {
  rect(RM.x, RM.y, RM.w, RM.h, '#f0f0f8');
  cx.strokeStyle = '#c0c0d8'; cx.lineWidth = 2;
  cx.strokeRect(RM.x, RM.y, RM.w, RM.h);
  const midY = (FLOOR_Y1 + FLOOR_Y2) / 2;
  cx.strokeStyle = '#d8d8e8'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(FLOOR_X1, midY); cx.lineTo(FLOOR_X2, midY); cx.stroke();
}

function drawTorch(x, y) {
  const t = combatTick * 0.003;
  const flicker = 0.7 + Math.sin(t * 7.3 + x) * 0.3;
  // Handle
  cx.fillStyle = '#5a3a1a';
  cx.fillRect(x - 3, y, 6, 12);
  // Glow
  const glow = cx.createRadialGradient(x, y - 4, 0, x, y - 4, 22);
  glow.addColorStop(0, `rgba(255,180,30,${0.35 * flicker})`);
  glow.addColorStop(1, 'transparent');
  cx.fillStyle = glow;
  cx.beginPath(); cx.arc(x, y - 4, 22, 0, Math.PI * 2); cx.fill();
  // Flame
  cx.fillStyle = `rgba(255,${Math.floor(140 * flicker)},10,0.95)`;
  cx.beginPath();
  cx.ellipse(x, y - 5, 5, 8, 0, 0, Math.PI * 2);
  cx.fill();
  cx.fillStyle = `rgba(255,220,80,0.85)`;
  cx.beginPath();
  cx.ellipse(x, y - 7, 3, 5, 0, 0, Math.PI * 2);
  cx.fill();
}

function drawSkull(x, y) {
  cx.fillStyle = '#2a2030';
  cx.beginPath(); cx.arc(x, y, 5, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = '#383040';
  cx.fillRect(x - 3, y + 3, 2, 2);
  cx.fillRect(x + 1, y + 3, 2, 2);
}

// ── Enemy sprite (emoji) ───────────────────────────────────────────────────────
function drawEnemy(enemyData, x, y, hp, maxHp, phase) {
  const bob = Math.sin(combatTick * 0.006) * 2;
  cx.save(); cx.translate(x, y + bob);
  cx.font = '20px serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(enemyData.emoji || '👹', 0, 0);
  if (phase > 0) {
    cx.font = "bold 9px 'Space Mono',monospace";
    cx.fillStyle = '#e84393'; cx.textBaseline = 'alphabetic';
    cx.fillText('★', 16, -16);
  }
  cx.textBaseline = 'alphabetic'; cx.textAlign = 'left';
  cx.restore();
}

// ── Player sprite (emoji) ─────────────────────────────────────────────────────
function drawPlayer(classId, x, y) {
  const bob = Math.sin(combatTick * 0.007) * 1.5;
  const emojiMap = { warrior:'🛡️', rogue:'🥷', mage:'🧙' };
  cx.save(); cx.translate(x, y + bob);
  cx.font = '20px serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(emojiMap[classId] || '🛡️', 0, 0);
  cx.textBaseline = 'alphabetic'; cx.textAlign = 'left';
  cx.restore();
}

// ── Words in combat ────────────────────────────────────────────────────────────
function drawWords() {
  words.forEach((w, i) => {
    if (w.invisible && w.invisBlinkTimer > 0 && Math.floor(w.invisBlinkTimer / 200) % 2 === 0) return;

    const isActive = (i === activeWordIdx);
    const isAttack = w.isAttack;
    const x = w.x, y = w.y;

    // Background pill
    cx.font = FONT;
    const bgW = Math.max(cx.measureText(w.text).width + 20, 60);
    const bgH = 22;
    const bgX = x - bgW/2, bgY = y - bgH/2 - 2;

    if (isActive) {
      // Glow for active word
      const glow = cx.createRadialGradient(x, y, 0, x, y, bgW * 0.7);
      glow.addColorStop(0, 'rgba(255,220,50,0.25)');
      glow.addColorStop(1, 'transparent');
      cx.fillStyle = glow;
      cx.beginPath(); cx.arc(x, y, bgW * 0.7, 0, Math.PI*2); cx.fill();
      roundRect(bgX - 2, bgY - 2, bgW + 4, bgH + 4, 4, null, '#ffd700', 1.5);
    }

    if (isAttack) {
      roundRect(bgX, bgY, bgW, bgH, 4, 'rgba(255,200,200,0.92)');
      roundRect(bgX, bgY, bgW, bgH, 4, null, '#cc3333', 1);
    } else {
      roundRect(bgX, bgY, bgW, bgH, 4, 'rgba(220,220,240,0.95)');
      roundRect(bgX, bgY, bgW, bgH, 4, null, isActive ? '#b8860b' : '#aaaacc', 1);
    }

    // Text — typed part green, rest dark/red
    const txt = w.text;
    const typedLen = isActive ? typed.length : 0;
    let drawX = x - cx.measureText(txt).width / 2;
    const textY = y + 5;

    if (typedLen > 0 && isActive) {
      const typedPart = txt.slice(0, typedLen);
      const restPart  = txt.slice(typedLen);
      cx.fillStyle = '#007744';
      cx.fillText(typedPart, drawX, textY);
      drawX += cx.measureText(typedPart).width;
      cx.fillStyle = isAttack ? '#cc1111' : '#222222';
      cx.fillText(restPart, drawX, textY);
    } else {
      cx.fillStyle = isAttack ? '#cc1111' : (isActive ? '#111' : '#333');
      cx.textAlign = 'center';
      cx.fillText(txt, x, textY);
      cx.textAlign = 'left';
    }

    // Attack label
    if (isAttack) {
      cx.fillStyle = '#ff4040';
      cx.font = "bold 9px 'Space Mono',monospace";
      cx.textAlign = 'center';
      cx.fillText('⚡ATK', x, bgY - 2);
      cx.font = FONT; cx.textAlign = 'left';
    }
  });
}

// ── Particles ──────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      life: 1, decay: 0.03 + Math.random() * 0.04,
      size: 2 + Math.random() * 4, color,
    });
  }
}

function spawnFloat(x, y, str, color) {
  floats.push({ x, y, str, color, life: 1, vy: -1.2 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.y += f.vy; f.life -= 0.018;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    cx.globalAlpha = p.life;
    cx.fillStyle = p.color;
    cx.beginPath(); cx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); cx.fill();
  });
  floats.forEach(f => {
    cx.globalAlpha = f.life;
    cx.font = "bold 14px 'Space Mono',monospace";
    cx.textAlign = 'center';
    cx.fillStyle = f.color;
    cx.fillText(f.str, f.x, f.y);
    cx.textAlign = 'left';
  });
  cx.globalAlpha = 1;
}

// ── MAP ────────────────────────────────────────────────────────────────────────
const ROOM_TYPE_META = {
  combat:  { icon:'⚔', label:'Combat',  color:'#d63031', bgColor:'#ffe8e8' },
  elite:   { icon:'☠', label:'Elite',   color:'#6c5ce7', bgColor:'#ede8ff' },
  shop:    { icon:'$', label:'Shop',    color:'#c07000', bgColor:'#fff5d6' },
  rest:    { icon:'♥', label:'Rest',    color:'#007a5f', bgColor:'#e6fff5' },
  boss:    { icon:'♛', label:'BOSS',    color:'#c01868', bgColor:'#ffe8f5' },
  entry:   { icon:'▶', label:'Start',   color:'#2980b9', bgColor:'#e6f0ff' },
};

function generateFloor(floorNum) {
  const nodes = [];
  const FE = RD.floorEnemies[floorNum];
  // Shuffle pool so each run draws different enemies
  const normalPool = [...FE.normal].sort(() => Math.random() - 0.5);

  function mkNode(type, enemyId, col, row) {
    return { type, enemyId: enemyId || null, col, row, cleared:false, reachable:false, id: nodes.length };
  }

  // Layout: row 0 = entry, rows 1-3 = dungeon, row 4 = boss
  // Two branches: left (col 0) and right (col 2), center is used for entry/boss
  nodes.push(mkNode('entry', null, 1, 0));    // index 0

  // Branch A (left)
  nodes.push(mkNode('combat', normalPool[0] || 'goblin_scout', 0, 1)); // 1
  const hasShopA = Math.random() < 0.5;
  nodes.push(mkNode(hasShopA ? 'shop' : 'rest', null, 0, 2));             // 2
  nodes.push(mkNode('combat', normalPool[1] || normalPool[0], 0, 3)); // 3

  // Branch B (right)
  nodes.push(mkNode('combat', normalPool[2] || normalPool[1] || normalPool[0], 2, 1)); // 4
  nodes.push(mkNode('elite', FE.elite[0], 2, 2));                           // 5
  nodes.push(mkNode(hasShopA ? 'rest' : 'shop', null, 2, 3));              // 6

  nodes.push(mkNode('boss', FE.boss, 1, 4));  // 7

  // Adjacency
  const adj = {
    0: [1, 4],
    1: [2], 2: [3], 3: [7],
    4: [5], 5: [6], 6: [7],
    7: [],
  };

  nodes[0].reachable = true;

  return { nodes, adj, floor: floorNum };
}

function buildMap() {
  const floor = P.floor || 1;
  const mapData = generateFloor(floor);
  mapNodes = mapData.nodes;
  // Set current position to entry (node 0)
  mapCurIdx = 0;
  mapNodes[0].cleared = true;
  // Make adj nodes reachable
  (mapData.adj[0] || []).forEach(i => { mapNodes[i].reachable = true; });
  G.mapAdj = mapData.adj;
  // Select first reachable node
  mapSelIdx = 1;
}

function getReachable() {
  return mapNodes.filter(n => n.reachable && !n.cleared);
}

function drawMapScreen() {
  // Background
  cx.fillStyle = '#f5f5fa';
  cx.fillRect(0, 0, W, H);

  // Subtle grid texture
  cx.strokeStyle = '#e0e0f0';
  for (let tx = 0; tx < W; tx += 40) cx.strokeRect(tx, 0, 40, H);
  for (let ty = 0; ty < H; ty += 40) cx.strokeRect(0, ty, W, 40);

  // Title bar
  cx.fillStyle = '#e8e8f4';
  cx.fillRect(0, 0, W, 44);
  cx.strokeStyle = '#c8c8d8'; cx.lineWidth = 1;
  cx.strokeRect(0, 0, W, 44);
  text('FLOOR ' + (P.floor || 1), 20, 28, '#888', FONT_SM);
  text('DUNGEON MAP', W/2, 28, '#b8860b', "bold 16px 'Space Mono',monospace", 'center');
  text('HP: ' + P.hp + '/' + P.maxHp, W - 20, 28, P.hp < P.maxHp * 0.3 ? '#e74c3c' : '#007744', FONT_SM, 'right');

  // Draw map nodes and corridors
  const nodePos = getNodePos();

  // Draw corridors first
  Object.entries(G.mapAdj || {}).forEach(([from, tos]) => {
    const fp = nodePos[+from];
    tos.forEach(to => {
      const tp = nodePos[to];
      cx.setLineDash([6, 8]);
      cx.strokeStyle = '#d0d0e0';
      cx.lineWidth = 12;
      cx.beginPath(); cx.moveTo(fp.x, fp.y); cx.lineTo(tp.x, tp.y); cx.stroke();
      cx.setLineDash([]);
      cx.strokeStyle = '#c0c0d0';
      cx.lineWidth = 6;
      cx.beginPath(); cx.moveTo(fp.x, fp.y); cx.lineTo(tp.x, tp.y); cx.stroke();
    });
  });

  // Draw nodes
  mapNodes.forEach((node, i) => {
    const p = nodePos[i];
    const meta = ROOM_TYPE_META[node.type] || ROOM_TYPE_META.combat;
    const isSelected = (i === mapSelIdx);
    const isCurrent = (i === mapCurIdx);
    const isReachable = node.reachable && !node.cleared;
    const isCleared = node.cleared && i !== mapCurIdx;

    const nodeW = 72, nodeH = 52;
    const nx = p.x - nodeW/2, ny = p.y - nodeH/2;

    // Node background
    let bgAlpha = isCleared ? 0.25 : (isReachable ? 1 : 0.4);
    let borderColor = isSelected ? '#b8860b' : (isReachable ? meta.color : '#ccccdd');
    let borderW = isSelected ? 2.5 : 1.5;

    cx.globalAlpha = bgAlpha;
    roundRect(nx, ny, nodeW, nodeH, 6, meta.bgColor || '#0d0820');
    cx.globalAlpha = 1;

    if (isSelected) {
      // Glow
      const g = cx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 55);
      g.addColorStop(0, `${meta.color}44`);
      g.addColorStop(1, 'transparent');
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(p.x, p.y, 55, 0, Math.PI*2); cx.fill();
    }

    roundRect(nx, ny, nodeW, nodeH, 6, null, borderColor, borderW);

    cx.globalAlpha = isCleared ? 0.3 : (isReachable ? 1 : 0.45);

    // Icon
    cx.font = "20px 'Space Mono',monospace";
    cx.textAlign = 'center';
    cx.fillStyle = isCleared ? '#aaa' : meta.color;
    cx.fillText(meta.icon, p.x, p.y - 3);

    // Label
    cx.font = "bold 9px 'Space Mono',monospace";
    cx.fillStyle = isCleared ? '#aaa' : (isSelected ? '#b8860b' : '#555');
    cx.fillText(meta.label.toUpperCase(), p.x, p.y + 14);

    cx.textAlign = 'left';
    cx.globalAlpha = 1;

    // Cleared X
    if (isCleared) {
      cx.strokeStyle = '#aaa'; cx.lineWidth = 2;
      cx.beginPath(); cx.moveTo(nx+4, ny+4); cx.lineTo(nx+nodeW-4, ny+nodeH-4); cx.stroke();
      cx.beginPath(); cx.moveTo(nx+nodeW-4, ny+4); cx.lineTo(nx+4, ny+nodeH-4); cx.stroke();
    }

    // Current position indicator
    if (isCurrent) {
      cx.fillStyle = '#2980b9';
      cx.font = "12px 'Space Mono',monospace";
      cx.textAlign = 'center';
      cx.fillText('YOU', p.x, ny - 8);
      cx.textAlign = 'left';
    }
  });

  // Controls hint
  cx.fillStyle = '#e8e8f4';
  cx.fillRect(0, H - 36, W, 36);
  cx.strokeStyle = '#c8c8d8'; cx.lineWidth = 1;
  cx.strokeRect(0, H - 36, W, 36);
  text('← → navigate rooms    ENTER: enter selected room', W/2, H - 12, '#555', FONT_SM, 'center');

  // Player stats sidebar hint
  if (P.spells && P.spells.length > 0) {
    text('Spells: ' + P.spells.map(s => s.toUpperCase()).join(' · '), 20, H - 12, '#6c5ce7', FONT_SM);
  }
}

function getNodePos() {
  // Map: cols 0,1,2  rows 0-4
  const colX = [180, W/2, 620];
  const rowY = [95, 185, 270, 355, 445];
  return mapNodes.map(n => ({ x: colX[n.col], y: rowY[n.row] }));
}

function mapNavigate(dir) {
  const reachable = mapNodes
    .map((n, i) => ({ n, i }))
    .filter(({ n }) => n.reachable && !n.cleared)
    .sort((a, b) => a.i - b.i);
  if (!reachable.length) return;
  const cur = reachable.findIndex(r => r.i === mapSelIdx);
  let next = (cur + dir + reachable.length) % reachable.length;
  mapSelIdx = reachable[next].i;
}

// ── COMBAT INIT ────────────────────────────────────────────────────────────────
function initCombat(enemyId) {
  const eData = RD.enemies[enemyId];
  if (!eData) { console.error('Unknown enemy:', enemyId); return; }

  enemy = {
    ...eData,
    hp: eData.hp,
    currentPhase: 0,
    phasesFired: new Set(),
    effectiveSpeed: eData.wordSpeed * (P.wordSpeedMult || 1.0),
    effectiveInterval: eData.wordInterval,
    hitFlash: 0,
  };

  words = [];
  typed = '';
  activeWordIdx = -1;
  combatTick = 0;
  spawnTimer = enemy.effectiveInterval * 0.5; // first word spawns fast
  attackTimer = enemy.attackInterval * 0.7;
  freezeTimer = 0;
  hasteTimer = 0;
  flashTimer = 0;
  flashMsg = '';
  scrambleTimer = eData.special === 'scramble' ? 15000 : 0;
  invisWordCount = 0;
  particles = [];
  floats = [];
  paused = false;

  // Boss music
  if (eData.type === 'boss') {
    RA.setTheme('boss');
  }

  G.screen = 'combat';
}

// ── COMBAT UPDATE ──────────────────────────────────────────────────────────────
function updateCombat(dt) {
  if (paused) return;
  combatTick += dt;

  const frozen = freezeTimer > 0;
  if (frozen) freezeTimer -= dt;
  if (hasteTimer > 0) hasteTimer -= dt;
  if (flashTimer > 0) flashTimer -= dt;

  // Spell cooldowns
  (P.spellCDs || []).forEach((cd, i) => {
    if (cd > 0) P.spellCDs[i] = Math.max(0, cd - dt);
  });

  // Scramble (Dread Sorcerer)
  if (enemy.id === 'dread_sorcerer') {
    scrambleTimer -= dt;
    if (scrambleTimer <= 0) {
      scrambleTimer = 15000;
      words.forEach(w => { w.x = rnd(LANE_X) + (Math.random() - 0.5) * 60; });
      spawnFloat(W/2, H/2 - 40, 'SCRAMBLE!', '#e17055');
    }
  }

  const speedFactor = frozen ? 0 : (hasteTimer > 0 ? 0.6 : 1.0);
  const speedMod = (P.upgrades && P.upgrades.includes('dk_chaos')) ? 2.0 : 1.0;

  // Move words
  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.y += w.speed * speedFactor * speedMod * (dt / 1000);
    if (w.invisBlinkTimer !== undefined) w.invisBlinkTimer -= dt;

    if (w.y >= WORD_EXIT_Y + 10) {
      if (w.isAttack) {
        // Attack word hit player
        let dmg = enemy.attackDmg;
        if (P.shield > 0) {
          const absorbed = Math.min(dmg, P.shield);
          P.shield -= absorbed; dmg -= absorbed;
          spawnFloat(PLAYER_CX, PLAYER_CY - 30, `-${absorbed} absorbed`, '#74b9ff');
        }
        if (dmg > 0) {
          P.hp = Math.max(0, P.hp - dmg);
          RA.playPlayerHit();
          spawnFloat(PLAYER_CX, PLAYER_CY - 30, `-${dmg}`, '#e74c3c');
          spawnParticles(PLAYER_CX, PLAYER_CY, '#e74c3c', 8);
          flashTimer = 400;
          flashMsg = `-${dmg} HP`;
          flashColor = '#e74c3c';
        }
        if (i === activeWordIdx) { typed = ''; activeWordIdx = -1; }
      }
      words.splice(i, 1);
      if (activeWordIdx >= i) activeWordIdx = Math.max(-1, activeWordIdx - 1);
      updateActiveWord();
    }
  }

  // Spawn regular words
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCombatWord();
    spawnTimer = enemy.effectiveInterval * (frozen ? 2 : 1);
  }

  // Spawn attack word
  attackTimer -= dt;
  if (attackTimer <= 0) {
    spawnCombatWord(true);
    attackTimer = enemy.attackInterval;
  }

  // Check boss phase transitions
  if (enemy.phases && enemy.phases.length > 0) {
    const enemyMaxHp = RD.enemies[enemy.id].hp;
    enemy.phases.forEach((ph, idx) => {
      if (!enemy.phasesFired.has(idx) &&
          enemy.hp / enemyMaxHp <= ph.hpThreshold) {
        enemy.phasesFired.add(idx);
        enemy.effectiveSpeed *= (ph.speedMult || 1);
        enemy.effectiveInterval *= (ph.intervalMult || 1);
        enemy.currentPhase = idx + 1;
        RA.playBossPhase();
        flashMsg = ph.announce || 'PHASE CHANGE!';
        flashColor = '#e84393';
        flashTimer = 2000;
        spawnFloat(W/2, H/2, ph.announce || 'PHASE!', '#e84393');
        spawnParticles(ENEMY_CX, ENEMY_CY, '#e84393', 20);
      }
    });
  }

  // Update particles
  updateParticles(dt);

  // Check death
  if (P.hp <= 0) {
    if (P.deathless && !P.deathlessUsed) {
      P.hp = 1;
      P.deathlessUsed = true;
      flashMsg = 'DEATHLESS!';
      flashColor = '#fd79a8';
      flashTimer = 1500;
    } else {
      RA.playGameOver();
      RA.stopMusic(1.5);
      G.screen = 'gameover';
      return;
    }
  }

  // Check enemy death
  if (enemy.hp <= 0) {
    enemy.hp = 0;
    words = [];
    RA.playRoomClear();
    // Give gold loot
    P.gold = (P.gold || 0) + (enemy.loot && enemy.loot.gold || 0);
    // Mark node cleared
    mapNodes[G.combatNodeIdx].cleared = true;
    // Unlock adjacent nodes
    (G.mapAdj[G.combatNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
    mapSelIdx = (G.mapAdj[G.combatNodeIdx] || [])[0] || 0;

    // Regen per room
    if (P.regenPerRoom) {
      P.hp = Math.min(P.maxHp, P.hp + P.regenPerRoom);
    }

    if (enemy.type === 'boss') {
      // Check if this is the final boss
      if (enemy.id === 'tyrant_prime') {
        G.screen = 'victory';
        RA.playVictory();
        RA.stopMusic(2);
        return;
      }
      // Move to next floor
      P.floor = (P.floor || 1) + 1;
      RA.setTheme('dungeon');
      G.screen = 'combat_result';
    } else {
      G.screen = 'upgrade';
      RA.setTheme('dungeon');
    }

    // Generate upgrade options
    upgradeOptions = pickUpgrades(3);
    upgradeChosen = false;
  }
}

function spawnCombatWord(isAttack) {
  const isInvis = enemy.special === 'invisible' && !isAttack && (invisWordCount % 3 === 2);
  if (enemy.special === 'invisible') invisWordCount++;

  const atkWords = RD.attackWords[enemy.floor] || RD.attackWords[1];
  const txt = isAttack ? rnd(atkWords) : pickWord();
  const laneIdx = Math.floor(Math.random() * 3);
  const xOff = (Math.random() - 0.5) * 50;

  words.push({
    text: txt,
    x: LANE_X[laneIdx] + xOff,
    y: WORD_SPAWN_Y,
    speed: enemy.effectiveSpeed,
    isAttack: !!isAttack,
    invisible: !!isInvis,
    invisBlinkTimer: isInvis ? 800 : 0,
  });
  updateActiveWord();
}

function updateActiveWord() {
  if (typed.length === 0) {
    activeWordIdx = -1;
    return;
  }
  // Find word matching typed prefix
  const idx = words.findIndex(w => w.text.startsWith(typed));
  activeWordIdx = idx;
}

// ── KEYBOARD INPUT ─────────────────────────────────────────────────────────────
function processKey(key) {
  if (G.screen === 'title') {
    if (key === 'Enter') { G.screen = 'class_select'; RA.startMusic('dungeon'); }
    return;
  }

  if (G.screen === 'class_select') {
    if (key === 'ArrowLeft')  classSelectIdx = (classSelectIdx + 2) % 3;
    if (key === 'ArrowRight') classSelectIdx = (classSelectIdx + 1) % 3;
    if (key === 'Enter')      startRun(CLASS_IDS[classSelectIdx]);
    return;
  }

  if (G.screen === 'map') {
    if (key === 'ArrowLeft')  mapNavigate(-1);
    if (key === 'ArrowRight') mapNavigate(1);
    if (key === 'Enter') {
      const node = mapNodes[mapSelIdx];
      if (node && node.reachable && !node.cleared) {
        enterNode(mapSelIdx);
      }
    }
    return;
  }

  if (G.screen === 'combat') {
    if (key === 'Escape') { paused = !paused; return; }
    if (paused) {
      if (key === 'm' || key === 'M') RA.toggleMute();
      return;
    }

    // Spell activation (number keys)
    if (P.spells && P.spells.length > 0) {
      const spellIdx = parseInt(key) - 1;
      if (spellIdx >= 0 && spellIdx < P.spells.length) {
        activateSpell(spellIdx);
        return;
      }
    }

    if (key === 'Backspace') {
      typed = typed.slice(0, -1);
      updateActiveWord();
      return;
    }

    if (key.length !== 1) return;

    // Try to extend typed
    const nextTyped = typed + key;

    // Check spell keyword match first
    if (P.spells) {
      const spIdx = P.spells.findIndex(s => s === nextTyped);
      if (spIdx >= 0) {
        activateSpell(spIdx);
        typed = '';
        activeWordIdx = -1;
        return;
      }
    }

    // Check if nextTyped is a valid prefix of any word
    const match = words.find(w => w.text.startsWith(nextTyped));
    if (match) {
      typed = nextTyped;
      RA.playKeyCorrect();
      updateActiveWord();

      // Check complete word
      if (match.text === typed) {
        destroyWord(words.indexOf(match));
      }
    } else {
      // Wrong key
      RA.playKeyWrong();
      if (typed.length > 0) typed = '';
      // Try single char
      const single = words.find(w => w.text.startsWith(key));
      if (single) {
        typed = key;
        updateActiveWord();
        if (single.text === typed) destroyWord(words.indexOf(single));
      } else {
        typed = '';
        activeWordIdx = -1;
      }
    }
    return;
  }

  if (G.screen === 'upgrade' || G.screen === 'combat_result') {
    if (!upgradeChosen && G.screen === 'upgrade') {
      const idx = parseInt(key) - 1;
      if (idx >= 0 && idx < upgradeOptions.length) {
        applyUpgrade(upgradeOptions[idx]);
        upgradeChosen = true;
        RA.playUpgradePick();
        setTimeout(() => {
          RA.setTheme('dungeon');
          G.screen = 'map';
        }, 700);
      }
    } else if (G.screen === 'combat_result') {
      if (key === 'Enter') {
        buildMap();
        RA.setTheme('dungeon');
        G.screen = 'map';
      }
    }
    return;
  }

  if (G.screen === 'shop') {
    if (key === 'Escape') { G.screen = 'map'; return; }
    if (key === 'ArrowUp') G.shopIdx = Math.max(0, (G.shopIdx || 0) - 1);
    if (key === 'ArrowDown') G.shopIdx = Math.min((G.shopItems || []).length - 1, (G.shopIdx || 0) + 1);
    if (key === 'Enter') {
      const item = (G.shopItems || [])[(G.shopIdx || 0)];
      if (item && P.gold >= item.cost && !item.owned) {
        P.gold -= item.cost;
        applyUpgrade(item.upgrade);
        item.owned = true;
        RA.playUpgradePick();
      }
    }
    return;
  }

  if (G.screen === 'rest') {
    if (key === 'Enter') {
      P.hp = Math.min(P.maxHp, P.hp + Math.floor(P.maxHp * 0.35));
      mapNodes[G.restNodeIdx].cleared = true;
      (G.mapAdj[G.restNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
      mapSelIdx = (G.mapAdj[G.restNodeIdx] || [])[0] || 0;
      G.screen = 'map';
    }
    return;
  }

  if (G.screen === 'gameover' || G.screen === 'victory') {
    if (key === 'Enter') { G.screen = 'title'; }
    return;
  }
}

function destroyWord(idx) {
  if (idx < 0 || idx >= words.length) return;
  const w = words[idx];
  let dmg = Math.ceil(w.text.length * P.dmgMult);
  // Longshot
  if (P.longshot && w.text.length >= 8) dmg *= 3;
  // Chaos
  if (P.upgrades && P.upgrades.includes('dk_chaos')) dmg *= 2;
  // Berserk
  if (P.berserk && P.hp < P.maxHp * 0.3) dmg = Math.ceil(dmg * (1 + 0.75));

  enemy.hp = Math.max(0, enemy.hp - dmg);
  enemy.hitFlash = 300;

  RA.playWordDestroy();
  RA.playEnemyHit();
  spawnParticles(w.x, w.y, '#ffd700', 8);
  spawnFloat(w.x, w.y - 20, `-${dmg}`, '#ffd700');

  if (P.vampiric) {
    P.hp = Math.min(P.maxHp, P.hp + 2);
    spawnFloat(PLAYER_CX + 20, PLAYER_CY - 20, '+2', '#00b894');
  }

  words.splice(idx, 1);
  if (activeWordIdx >= idx) activeWordIdx = Math.max(-1, activeWordIdx - 1);
  typed = '';
  updateActiveWord();
}

function activateSpell(spellIdx) {
  const spellName = P.spells[spellIdx];
  const cd = P.spellCDs[spellIdx];
  if (cd > 0) return; // on cooldown

  const upg = RD.upgrades.find(u => u.spell === spellName);
  if (!upg) return;

  const amp = P.spellAmp ? 1.5 : 1.0;
  P.spellCDs[spellIdx] = upg.cd;
  RA.playSpellCast();

  switch (spellName) {
    case 'freeze':
      freezeTimer = 3000 * amp;
      spawnFloat(W/2, ENEMY_CY, 'FREEZE!', '#74b9ff');
      break;
    case 'shield':
      P.shield = (P.shield || 0) + Math.floor(30 * amp);
      spawnFloat(PLAYER_CX, PLAYER_CY - 30, `SHIELD +${Math.floor(30*amp)}`, '#74b9ff');
      break;
    case 'nova': {
      const wCount = words.length;
      const novaDmg = Math.floor(15 * amp);
      enemy.hp = Math.max(0, enemy.hp - wCount * novaDmg);
      spawnParticles(W/2, (FLOOR_Y1+FLOOR_Y2)/2, '#fd79a8', 30);
      spawnFloat(W/2, H/2, `NOVA! -${wCount * novaDmg}`, '#fd79a8');
      words = []; typed = ''; activeWordIdx = -1;
      break;
    }
    case 'haste':
      hasteTimer = 5000 * amp;
      spawnFloat(W/2, ENEMY_CY, 'HASTE!', '#f39c12');
      break;
    case 'drain': {
      const drainAmt = Math.floor(20 * amp);
      enemy.hp = Math.max(0, enemy.hp - drainAmt);
      P.hp = Math.min(P.maxHp, P.hp + drainAmt);
      spawnFloat(W/2, H/2, `DRAIN! +${drainAmt}HP`, '#00b894');
      break;
    }
    case 'blast': {
      const blastDmg = Math.floor(80 * amp);
      enemy.hp = Math.max(0, enemy.hp - blastDmg);
      spawnParticles(ENEMY_CX, ENEMY_CY, '#fd79a8', 20);
      spawnFloat(ENEMY_CX, ENEMY_CY - 30, `-${blastDmg}`, '#fd79a8');
      break;
    }
  }
}

// ── UPGRADES ───────────────────────────────────────────────────────────────────
function pickUpgrades(count) {
  const pool = [...RD.upgrades];
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  // Prefer variety: avoid duplicate types
  const result = [];
  const usedTypes = new Set();
  for (const u of pool) {
    if (result.length >= count) break;
    if (!usedTypes.has(u.type)) {
      result.push(u);
      usedTypes.add(u.type);
    }
  }
  while (result.length < count && pool.length > result.length) {
    const u = pool.find(x => !result.includes(x));
    if (u) result.push(u); else break;
  }
  return result.slice(0, count);
}

function applyUpgrade(upg) {
  if (!upg) return;
  if (!P.upgrades) P.upgrades = [];
  P.upgrades.push(upg.id);

  const e = upg.effect || {};
  if (e.maxHpBonus) { P.maxHp += e.maxHpBonus; }
  if (e.healNow) { P.hp = Math.min(P.maxHp, P.hp + e.healNow); }
  if (e.wordSpeedMult) { P.wordSpeedMult = (P.wordSpeedMult || 1) * e.wordSpeedMult; }
  if (e.dmgMult) { P.dmgMult += e.dmgMult; }
  if (e.regenPerRoom) { P.regenPerRoom = (P.regenPerRoom || 0) + e.regenPerRoom; }
  if (e.berserk) { P.berserk = true; }
  if (e.vampiric) { P.vampiric = true; }
  if (e.longshot) { P.longshot = true; }
  if (e.deathless) { P.deathless = true; }
  if (e.purge) { /* filter applied in pickWord */ }
  if (e.inject) { /* power words added in pickWord */ }
  if (e.chaos) { P.dmgMult *= 2; }

  // Spell upgrades
  if (upg.type === 'spell' && upg.spell) {
    if (!P.spells) { P.spells = []; P.spellCDs = []; }
    if (!P.spells.includes(upg.spell)) {
      P.spells.push(upg.spell);
      P.spellCDs.push(0);
    }
  }
}

// ── RUN INIT ───────────────────────────────────────────────────────────────────
function startRun(classId) {
  const cls = RD.classes[classId];
  P = {
    classId,
    hp: cls.hp + (cls.id === 'warrior' ? 15 : 0),
    maxHp: cls.hp + (cls.id === 'warrior' ? 15 : 0),
    dmgMult: cls.dmgMult,
    wordSpeedMult: cls.wordSpeedMult,
    gold: 0,
    floor: 1,
    spells: [],
    spellCDs: [],
    upgrades: [],
    berserk: false, vampiric: false, longshot: false, deathless: false,
    shield: 0,
    regenPerRoom: 0,
    spellAmp: cls.id === 'mage',
  };
  // Mage starts with freeze
  if (cls.startSpell) {
    P.spells.push(cls.startSpell);
    P.spellCDs.push(0);
  }
  buildMap();
  RA.setTheme('dungeon');
  G.screen = 'map';
}

// ── ENTER NODE ────────────────────────────────────────────────────────────────
function enterNode(nodeIdx) {
  const node = mapNodes[nodeIdx];
  mapCurIdx = nodeIdx;

  // Regen on room entry
  if (P.regenPerRoom && node.type !== 'rest') {
    P.hp = Math.min(P.maxHp, P.hp + P.regenPerRoom);
  }

  if (node.type === 'combat' || node.type === 'elite' || node.type === 'boss') {
    G.combatNodeIdx = nodeIdx;
    RA.setTheme(node.type === 'boss' ? 'boss' : 'combat');
    initCombat(node.enemyId);
  }
  else if (node.type === 'rest') {
    G.restNodeIdx = nodeIdx;
    G.screen = 'rest';
  }
  else if (node.type === 'shop') {
    setupShop(nodeIdx);
    G.screen = 'shop';
  }
  else if (node.type === 'entry') {
    // Already on entry, just show map
  }
}

function setupShop(nodeIdx) {
  const available = RD.upgrades.filter(u => !P.upgrades.includes(u.id));
  const items = [];
  // 3 random upgrades for sale
  const pool = [...available].sort(() => Math.random() - 0.5).slice(0, 3);
  pool.forEach((u, i) => {
    const cost = u.rarity === 'epic' ? 80 : u.rarity === 'rare' ? 55 : u.rarity === 'uncommon' ? 35 : 20;
    items.push({ upgrade: u, cost, owned: false });
  });
  G.shopItems = items;
  G.shopIdx = 0;
  G.shopNodeIdx = nodeIdx;
}

function wrapText(str, x, y, maxW, lineH, align) {
  const words = str.split(' ');
  let line = '';
  let lineY = y;
  cx.textAlign = align || 'left';
  words.forEach(w => {
    const test = line + (line ? ' ' : '') + w;
    if (cx.measureText(test).width > maxW && line) {
      cx.fillText(line, align === 'center' ? x + maxW/2 : x, lineY);
      line = w; lineY += lineH;
    } else {
      line = test;
    }
  });
  if (line) cx.fillText(line, align === 'center' ? x + maxW/2 : x, lineY);
  cx.textAlign = 'left';
}

function drawCombatScreen() {
  // Background (dungeon room)
  cx.fillStyle = '#f5f5fa';
  cx.fillRect(0, 0, W, H);

  drawDungeonRoom();

  // Screen flash on hit
  if (flashTimer > 0) {
    const alpha = (flashTimer / 400) * 0.25;
    cx.fillStyle = `rgba(200,30,30,${Math.min(alpha, 0.18)})`;
    cx.fillRect(0, 0, W, H);
  }

  // Freeze overlay
  if (freezeTimer > 0) {
    cx.fillStyle = 'rgba(74,184,255,0.07)';
    cx.fillRect(FLOOR_X1, FLOOR_Y1, FLOOR_W, FLOOR_H);
  }

  // Enemy HP bar (top strip)
  const eData = RD.enemies[enemy.id] || enemy;
  cx.fillStyle = '#e8e8f4';
  cx.fillRect(0, 0, W, 50);
  cx.strokeStyle = '#c0c0d0'; cx.lineWidth = 1;
  cx.strokeRect(0, 0, W, 50);

  if (enemy.hitFlash > 0) {
    cx.fillStyle = `rgba(255,80,80,${(enemy.hitFlash/300)*0.25})`;
    cx.fillRect(0, 0, W, 50);
    enemy.hitFlash = Math.max(0, enemy.hitFlash - 16);
  }

  // Enemy name
  const etype = eData.type === 'boss' ? ' ♛' : eData.type === 'elite' ? ' ☠' : '';
  text(enemy.name.toUpperCase() + etype, 20, 22, enemy.color || '#e74c3c', "bold 14px 'Space Mono',monospace");
  if (enemy.currentPhase > 0) {
    text(`PHASE ${enemy.currentPhase + 1}`, 20, 38, '#e84393', "bold 9px 'Space Mono',monospace");
  }

  // Enemy HP bar
  hpBar(180, 16, 400, 16, enemy.hp, RD.enemies[enemy.id].hp, enemy.color || '#e74c3c');
  text(enemy.hp + ' / ' + RD.enemies[enemy.id].hp, 590, 30, '#777', FONT_SM);

  // Floor indicator
  text('FLOOR ' + P.floor, W - 90, 22, '#777', FONT_SM);

  // Draw enemy sprite
  drawEnemy(enemy, ENEMY_CX, ENEMY_CY, enemy.hp, RD.enemies[enemy.id].hp, enemy.currentPhase);

  // Draw player sprite
  drawPlayer(P.classId, PLAYER_CX, PLAYER_CY);

  // Draw words
  cx.font = FONT;
  drawWords();

  // Particles
  drawParticles();

  // Freeze indicator
  if (freezeTimer > 0) {
    text('❄ FROZEN', W/2, FLOOR_Y1 + 18, '#2980b9', "bold 11px 'Space Mono',monospace", 'center');
  }

  // ── Bottom HUD ──────────────────────────────────────────────────────────────
  const hudY = RM.y + RM.h;
  cx.fillStyle = '#e8e8f4';
  cx.fillRect(0, hudY, W, H - hudY);
  cx.strokeStyle = '#c0c0d0'; cx.lineWidth = 1;
  cx.strokeRect(0, hudY, W, H - hudY);

  // Player HP bar
  const hpColor = P.hp < P.maxHp * 0.3 ? '#e74c3c' : P.hp < P.maxHp * 0.6 ? '#f39c12' : '#00b894';
  hpBar(20, hudY + 10, 230, 14, P.hp, P.maxHp, hpColor);
  text(P.classId.toUpperCase() + '  ' + P.hp + '/' + P.maxHp, 20, hudY + 36, '#555', FONT_SM);

  // Shield
  if (P.shield > 0) {
    text('🛡 ' + P.shield, 258, hudY + 22, '#2980b9', FONT_SM);
  }

  // Gold
  text('¢' + P.gold, W - 60, hudY + 22, '#c07000', FONT_SM, 'right');

  // Spell buttons
  if (P.spells && P.spells.length > 0) {
    P.spells.forEach((spell, i) => {
      const cd = P.spellCDs[i] || 0;
      const ready = cd === 0;
      const spellX = 20 + i * 140;
      const spellY = hudY + 48;
      roundRect(spellX, spellY, 128, 22, 4, ready ? '#d0f0d8' : '#e8e8f8');
      roundRect(spellX, spellY, 128, 22, 4, null, ready ? '#007a5f' : '#aaa', 1);
      if (!ready) {
        roundRect(spellX, spellY, 128 * (1 - cd / (RD.upgrades.find(u => u.spell === spell)?.cd || 15000)), 22, 4, '#99cc99');
      }
      text(`[${i+1}] ${spell.toUpperCase()}`, spellX + 6, spellY + 15, ready ? '#007744' : '#888', "bold 10px 'Space Mono',monospace");
      if (!ready) text(`${(cd/1000).toFixed(1)}s`, spellX + 90, spellY + 15, '#777', "9px 'Space Mono',monospace");
    });
  }

  // Typed input display
  const inputX = 20;
  const inputY = H - 20;
  text('> ' + typed + (Math.floor(combatTick / 400) % 2 === 0 ? '█' : ' '), inputX, inputY, '#007744', FONT);

  // Pause indicator
  if (paused) {
    cx.fillStyle = 'rgba(0,0,0,0.75)';
    cx.fillRect(0, 0, W, H);
    text('PAUSED', W/2, H/2 - 10, '#2980b9', FONT_XL, 'center');
    text('ESC to resume · M to mute', W/2, H/2 + 28, '#555', FONT_SM, 'center');
  }

  // Flash message
  if (flashTimer > 0) {
    const a = clamp(flashTimer / 600, 0, 1);
    cx.globalAlpha = a;
    text(flashMsg, W/2, H/2 - 60, flashColor, FONT_LG, 'center');
    cx.globalAlpha = 1;
  }
}

function drawUpgradeScreen() {
  cx.fillStyle = '#f5f5fa';
  cx.fillRect(0, 0, W, H);

  text('ROOM CLEARED!', W/2, 55, '#b8860b', FONT_LG, 'center');
  text('CHOOSE AN UPGRADE', W/2, 80, '#888', FONT_SM, 'center');

  cx.strokeStyle = '#b8860b44'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(120, 90); cx.lineTo(W-120, 90); cx.stroke();

  const cardW = 190, cardH = 260, gap = 22;
  const totalW = upgradeOptions.length * cardW + (upgradeOptions.length - 1) * gap;
  const startX = (W - totalW) / 2;

  upgradeOptions.forEach((u, i) => {
    const cx2 = startX + i * (cardW + gap);
    const cy2 = 110;
    const rarCol = RD.rarityColor[u.rarity] || '#fff';
    const typeIcon = { passive:'◆', spell:'✦', deck:'⊕' }[u.type] || '◆';

    roundRect(cx2, cy2, cardW, cardH, 10, '#eeeefc');
    roundRect(cx2, cy2, cardW, cardH, 10, null, rarCol, 2);

    // Key hint
    roundRect(cx2 + 8, cy2 + 8, 24, 24, 4, rarCol + '33');
    text(`${i+1}`, cx2 + 20, cy2 + 25, rarCol, "bold 14px 'Space Mono',monospace", 'center');

    // Type icon
    cx.font = "28px 'Space Mono',monospace";
    cx.textAlign = 'center';
    cx.fillStyle = rarCol;
    cx.fillText(typeIcon, cx2 + cardW/2, cy2 + 80);

    // Name
    cx.font = "bold 13px 'Space Mono',monospace";
    cx.fillStyle = '#111';
    cx.fillText(u.name, cx2 + cardW/2, cy2 + 110);

    // Rarity
    cx.font = "10px 'Space Mono',monospace";
    cx.fillStyle = rarCol;
    cx.fillText(u.rarity.toUpperCase(), cx2 + cardW/2, cy2 + 128);

    // Type label
    cx.fillStyle = '#555';
    cx.fillText(u.type.toUpperCase(), cx2 + cardW/2, cy2 + 144);

    // Description
    cx.fillStyle = '#555';
    cx.font = "10px 'Space Mono',monospace";
    wrapText(u.desc, cx2 + 14, cy2 + 172, cardW - 28, 15, 'center');

    cx.textAlign = 'left';
  });

  if (!upgradeChosen) {
    text('Press 1 · 2 · 3 to choose', W/2, H - 20, '#555', FONT_SM, 'center');
  } else {
    text('Applying upgrade...', W/2, H - 20, '#b8860b', FONT_SM, 'center');
  }
}

function drawCombatResultScreen() {
  cx.fillStyle = '#f5f5fa';
  cx.fillRect(0, 0, W, H);

  cx.save();
  cx.shadowBlur = 20; cx.shadowColor = '#b8860b';
  text('BOSS DEFEATED!', W/2, 155, '#b8860b', "bold 38px 'Space Mono',monospace", 'center');
  cx.restore();

  text('FLOOR ' + ((P.floor||1) - 1) + ' CLEARED', W/2, 205, '#888', FONT, 'center');

  cx.strokeStyle = '#b8860b44'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(200, 220); cx.lineTo(W-200, 220); cx.stroke();

  text('HP: ' + P.hp + ' / ' + P.maxHp, W/2, 258, P.hp < P.maxHp*0.3 ? '#e74c3c' : '#007a5f', FONT, 'center');
  text('Gold: ¢' + P.gold, W/2, 288, '#c07000', FONT, 'center');
  if (P.upgrades && P.upgrades.length) {
    text('Upgrades: ' + P.upgrades.length, W/2, 318, '#6c5ce7', FONT, 'center');
  }

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER → NEXT FLOOR', W/2, 390, '#007744', FONT, 'center');
}

function drawShopScreen() {
  cx.fillStyle = '#f5f5fa';
  cx.fillRect(0, 0, W, H);
  cx.strokeStyle = '#e0e0f0'; cx.lineWidth = 1;
  for (let tx = 0; tx < W; tx += TILE) cx.strokeRect(tx, 0, TILE, H);
  for (let ty = 0; ty < H; ty += TILE) cx.strokeRect(0, ty, W, TILE);

  text('SHOP', W/2, 55, '#c07000', "bold 28px 'Space Mono',monospace", 'center');
  text('Gold: ¢' + P.gold, W/2, 80, '#888', FONT, 'center');

  cx.strokeStyle = '#c0700044'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(150, 92); cx.lineTo(W-150, 92); cx.stroke();

  const items = G.shopItems || [];
  items.forEach((item, i) => {
    const u = item.upgrade;
    const selected = i === (G.shopIdx || 0);
    const canBuy = P.gold >= item.cost && !item.owned;
    const rowY = 115 + i * 85;

    if (selected) {
      const g = cx.createRadialGradient(W/2, rowY+35, 0, W/2, rowY+35, 280);
      g.addColorStop(0, '#f39c1211');
      g.addColorStop(1, 'transparent');
      cx.fillStyle = g; cx.fillRect(0, rowY-5, W, 90);
    }

    roundRect(120, rowY, W-240, 70, 6, '#eeeefc');
    roundRect(120, rowY, W-240, 70, 6, null, selected ? '#c07000' : '#c0c0d8', selected ? 2 : 1);

    const rarCol = RD.rarityColor[u.rarity] || '#fff';
    text(u.name, 148, rowY + 24, item.owned ? '#aaa' : '#111', "bold 13px 'Space Mono',monospace");
    text(u.rarity.toUpperCase() + ' ' + u.type.toUpperCase(), 148, rowY + 42, item.owned ? '#bbb' : rarCol, "10px 'Space Mono',monospace");
    text(u.desc, 148, rowY + 58, item.owned ? '#bbb' : '#555', "9px 'Space Mono',monospace");
    const costStr = item.owned ? 'OWNED' : ('¢' + item.cost);
    text(costStr, W - 138, rowY + 35, item.owned ? '#aaa' : (canBuy ? '#c07000' : '#e74c3c'), "bold 14px 'Space Mono',monospace", 'right');
  });

  text('↑↓ navigate · ENTER buy · ESC leave', W/2, H - 20, '#333', FONT_SM, 'center');
}

function drawRestScreen() {
  cx.fillStyle = '#f0fff5';
  cx.fillRect(0, 0, W, H);
  cx.strokeStyle = '#c0e8c8'; cx.lineWidth = 1;
  for (let tx = 0; tx < W; tx += TILE) cx.strokeRect(tx, 0, TILE, H);
  for (let ty = 0; ty < H; ty += TILE) cx.strokeRect(0, ty, W, TILE);

  cx.save();
  cx.shadowBlur = 15; cx.shadowColor = '#007a5f';
  text('♥ REST SITE ♥', W/2, 170, '#007a5f', "bold 28px 'Space Mono',monospace", 'center');
  cx.restore();

  text('A moment of respite in the dungeon...', W/2, 215, '#555', FONT_SM, 'center');
  cx.strokeStyle = '#007a5f44'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(200, 228); cx.lineTo(W-200, 228); cx.stroke();

  const healAmt = Math.floor(P.maxHp * 0.35);
  text(`Heal ${healAmt} HP  (${P.hp} → ${Math.min(P.maxHp, P.hp + healAmt)})`, W/2, 275, '#007744', FONT, 'center');
  text(`Max HP: ${P.maxHp}`, W/2, 308, '#555', FONT, 'center');

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER TO REST', W/2, 380, '#007744', FONT, 'center');
}

function drawGameOverScreen() {
  cx.fillStyle = '#fff5f8';
  cx.fillRect(0, 0, W, H);

  cx.save();
  cx.shadowBlur = 20; cx.shadowColor = '#e74c3c';
  text('DEFEATED', W/2, 175, '#e74c3c', "bold 50px 'Space Mono',monospace", 'center');
  cx.restore();

  cx.strokeStyle = '#e74c3c33'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(180, 195); cx.lineTo(W-180, 195); cx.stroke();

  text('Slain by ' + (enemy ? enemy.name : 'the dungeon'), W/2, 238, '#666', FONT, 'center');
  text('Floor ' + (P.floor || 1), W/2, 268, '#555', FONT, 'center');
  text('Gold: ¢' + (P.gold || 0), W/2, 298, '#c07000', FONT, 'center');
  if (P.upgrades && P.upgrades.length) {
    text('Upgrades collected: ' + P.upgrades.length, W/2, 328, '#6c5ce7', FONT, 'center');
  }

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER TO RETURN', W/2, 400, '#777', FONT, 'center');
}

function drawVictoryScreen() {
  cx.fillStyle = '#f5fff5';
  cx.fillRect(0, 0, W, H);

  cx.save();
  cx.shadowBlur = 20; cx.shadowColor = '#b8860b';
  text('TYRANT PRIME', W/2, 135, '#b8860b', "bold 40px 'Space Mono',monospace", 'center');
  text('DEFEATED!', W/2, 188, '#007744', "bold 36px 'Space Mono',monospace", 'center');
  cx.restore();

  cx.strokeStyle = '#b8860b44'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(150, 200); cx.lineTo(W-150, 200); cx.stroke();

  text('THE DUNGEON HAS BEEN CONQUERED', W/2, 248, '#777', FONT_SM, 'center');
  text('CLASS: ' + (P.classId || '').toUpperCase(), W/2, 290, '#2980b9', FONT, 'center');
  text('HP REMAINING: ' + P.hp + '/' + P.maxHp, W/2, 320, P.hp < P.maxHp*0.3 ? '#e74c3c' : '#007a5f', FONT, 'center');
  text('Gold: ¢' + P.gold, W/2, 350, '#c07000', FONT, 'center');
  text('Upgrades: ' + (P.upgrades || []).length, W/2, 380, '#6c5ce7', FONT, 'center');

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER TO PLAY AGAIN', W/2, 440, '#007744', FONT, 'center');
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────────
let lastT = 0;

function loop(t) {
  const dt = Math.min(t - lastT, 50); // cap at 50ms
  lastT = t;

  cx.clearRect(0, 0, W, H);

  switch (G.screen) {
    case 'title':         drawTitle();             break;
    case 'class_select':  drawClassSelectScreen();  break;
    case 'map':           drawMapScreen();           break;
    case 'combat':
      updateCombat(dt);
      drawCombatScreen();
      break;
    case 'upgrade':       drawUpgradeScreen();       break;
    case 'combat_result': drawCombatResultScreen();  break;
    case 'shop':          drawShopScreen();           break;
    case 'rest':          drawRestScreen();           break;
    case 'gameover':      drawGameOverScreen();       break;
    case 'victory':       drawVictoryScreen();        break;
  }

  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  // Prevent default for game keys
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Backspace'].includes(e.key))
    e.preventDefault();
  processKey(e.key);
});

// ── INIT ───────────────────────────────────────────────────────────────────────
// Title particles
for (let i = 0; i < 40; i++) {
  titleParticles.push({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    r: 1 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
    color: ['#4a3070','#3a2060','#2a1850','#7c3aed22'][Math.floor(Math.random()*4)],
  });
}

requestAnimationFrame(loop);
</script>
