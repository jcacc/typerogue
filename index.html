<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYPEROGUE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex; justify-content:center; align-items:center;
      height:100vh; overflow:hidden;
      font-family:'Space Mono','Courier New',monospace;
    }
    canvas { display:block; image-rendering:pixelated; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script src="words.js"></script>
<script src="rogue-audio.js"></script>
<script src="rogue-data.js"></script>
<script>
'use strict';

// ── Canvas ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const cx = canvas.getContext('2d');
const W = 800, H = 520;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H, 1.6);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize); resize();

// ── Colors ─────────────────────────────────────────────────────────────────────
const C = {
  bg:     '#000000',
  txt:    '#666666',
  hi:     '#aaaaaa',
  dim:    '#333333',
  white:  '#cccccc',
  gold:   '#886600',
  red:    '#993333',
  blue:   '#336699',
  purple: '#554488',
  cyan:   '#226655',
};

// ── Constants ──────────────────────────────────────────────────────────────────
const FONT    = "bold 15px 'Space Mono','Courier New',monospace";
const FONT_SM = "11px 'Space Mono','Courier New',monospace";
const FONT_LG = "bold 22px 'Space Mono','Courier New',monospace";
const FONT_XL = "bold 32px 'Space Mono','Courier New',monospace";

// Combat room bounds
const RM = { x:30, y:50, w:740, h:390 };
const WALL = 28;
const FLOOR_X1 = RM.x + WALL;
const FLOOR_Y1 = RM.y + WALL;
const FLOOR_X2 = RM.x + RM.w - WALL;
const FLOOR_Y2 = RM.y + RM.h - WALL;
const FLOOR_W  = FLOOR_X2 - FLOOR_X1;
const FLOOR_H  = FLOOR_Y2 - FLOOR_Y1;

const ENEMY_CX  = W / 2;
const ENEMY_CY  = FLOOR_Y1 + 58;
const PLAYER_CX = W / 2;
const PLAYER_CY = FLOOR_Y2 - 58;

const WORD_SPAWN_Y = ENEMY_CY  + 48;
const WORD_EXIT_Y  = PLAYER_CY - 40;

const LANE_X = [FLOOR_X1 + 95, W / 2, FLOOR_X2 - 95];

const RD = window.ROGUE_DATA;
const RA = window.ROGUE_AUDIO;

// ── CRT filter ─────────────────────────────────────────────────────────────────
let crtEnabled = false;

// ── ASCII Sprites ──────────────────────────────────────────────────────────────
const ASCII_ENEMY = {
  goblin_scout:   [' .o. ', '(o_o)', ' |g| '],
  cave_troll:     [' _O_ ', '[T_T]', ' )_( '],
  cursed_tome:    ['.---.', '| & |', "'---'"],
  goblin_king:    ['<K_K>', '-[K]-', ' ]|[ '],
  dire_rat:       [' ~~~ ', '(r.r)', ' u u '],
  goblin_shaman:  [' ~S~ ', '(S*S)', ' |~| '],
  shadow_archer:  [' .A. ', '>-A->', '  |  '],
  void_wraith:    ['~W~W~', ')w~.(', ' ~~~ '],
  bone_oracle:    ['.O_O.', '|o+o|', ' ||| '],
  lich_lord:      [' _L_ ', '[L.L]', ' }|{ '],
  plague_knight:  [' *K* ', '[K_K]', ' /|\\'],
  spectral_wolf:  ['.w.w.', '(w.w)', ' u u '],
  storm_knight:   [' *K* ', '[K+K]', ' ||| '],
  dread_sorcerer: [' {S} ', '(S~S)', ' |*| '],
  iron_golem:     ['[G_G]', '|G+G|', '[___]'],
  tyrant_prime:   ['*[T]*', '[T_T]', '*[T]*'],
};

const ASCII_PLAYER = {
  warrior: [' [@] ', '[W+W]', '  Y  '],
  rogue:   [' [@] ', '-[R]-', ' /|\\'],
  mage:    [' *** ', ' [@] ', ' |+| '],
};

// ── State ──────────────────────────────────────────────────────────────────────
let G = { screen:'title' };

let titleTick = 0;
let classSelectIdx = 0;
const CLASS_IDS = ['warrior', 'rogue', 'mage'];

let mapNodes = [], mapCurIdx = 0, mapSelIdx = 0;

let words = [], typed = '', activeWordIdx = -1;
let enemy = null;
let combatTick = 0, spawnTimer = 0, attackTimer = 0, pickupTimer = 0;
let freezeTimer = 0, hasteTimer = 0, flashTimer = 0;
let flashMsg = '', flashColor = '#fff';
let scrambleTimer = 0;
let invisWordCount = 0;

let P = {};

let upgradeOptions = [], upgradeChosen = false;

// Float text only (no particles)
let floats = [];

let paused = false;

// ── Map room type metadata ─────────────────────────────────────────────────────
const ROOM_TYPE_META = {
  combat:  { icon:'!', label:'Combat',  color: C.red    },
  elite:   { icon:'%', label:'Elite',   color: C.purple },
  shop:    { icon:'$', label:'Shop',    color: C.gold   },
  rest:    { icon:'+', label:'Rest',    color: C.cyan   },
  boss:    { icon:'B', label:'BOSS',    color:'#993366' },
  entry:   { icon:'>', label:'Start',   color: C.blue   },
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function pickWord() {
  const tiers = window.TYPERUN_WORDS.tiers;
  const e = enemy;
  let pool = [];
  (e.wordTiers || [0,1]).forEach(t => pool.push(...tiers[t]));
  if (P.upgrades && P.upgrades.includes('dk_purge'))
    pool = pool.filter(w => w.length < 10);
  if (P.upgrades && P.upgrades.includes('dk_inject'))
    pool = pool.concat(RD.powerWords);
  if (P.upgrades && P.upgrades.includes('dk_chaos'))
    pool = pool.filter(w => w.length >= 5);
  const onScreen = new Set(words.map(w => w.text));
  const fresh = pool.filter(w => !onScreen.has(w));
  return rnd(fresh.length ? fresh : pool) || 'bash';
}

// ── Text helpers ───────────────────────────────────────────────────────────────
function text(str, x, y, color, font, align) {
  cx.fillStyle = color || C.txt;
  cx.font = font || FONT;
  cx.textAlign = align || 'left';
  cx.fillText(str, x, y);
  cx.textAlign = 'left';
}

function wrapText(str, x, y, maxW, lineH, align) {
  const ws = str.split(' ');
  let line = '', lineY = y;
  cx.textAlign = align || 'left';
  ws.forEach(w => {
    const test = line + (line ? ' ' : '') + w;
    if (cx.measureText(test).width > maxW && line) {
      cx.fillText(line, align === 'center' ? x + maxW/2 : x, lineY);
      line = w; lineY += lineH;
    } else { line = test; }
  });
  if (line) cx.fillText(line, align === 'center' ? x + maxW/2 : x, lineY);
  cx.textAlign = 'left';
}

// ASCII HP bar: [====....] hp/max
function asciiBar(x, y, hp, maxHp, label) {
  const pct = clamp(hp / maxHp, 0, 1);
  const n = 16;
  const filled = Math.round(pct * n);
  const bar = '[' + '='.repeat(filled) + '.'.repeat(n - filled) + ']';
  const col = hp < maxHp * 0.3 ? C.red : (hp < maxHp * 0.6 ? C.gold : C.txt);
  const line = (label ? label + ' ' : '') + bar + ' ' + hp + '/' + maxHp;
  cx.fillStyle = col;
  cx.font = FONT_SM;
  cx.fillText(line, x, y);
}

// ── Box-drawing dungeon room ───────────────────────────────────────────────────
const BOX_FONT = "14px 'Space Mono','Courier New',monospace";
const BOX_CW = 8.4;
const BOX_CH = 18;

function drawDungeonRoom() {
  cx.font = BOX_FONT;
  cx.textAlign = 'left';

  const cols = Math.round(RM.w / BOX_CW);
  const rows = 21;
  const x0 = RM.x;
  const y0 = RM.y + BOX_CH - 4;

  cx.fillStyle = C.dim;
  cx.fillText('╔' + '═'.repeat(cols - 2) + '╗', x0, y0);
  cx.fillText('╚' + '═'.repeat(cols - 2) + '╝', x0, y0 + (rows - 1) * BOX_CH);

  for (let r = 1; r < rows - 1; r++) {
    cx.fillText('║', x0, y0 + r * BOX_CH);
    cx.fillText('║', x0 + (cols - 1) * BOX_CW, y0 + r * BOX_CH);
  }

  // Middle divider
  const midRow = 10;
  cx.fillStyle = '#1a1a1a';
  cx.fillText('╟' + '─'.repeat(cols - 2) + '╢', x0, y0 + midRow * BOX_CH);

  // Floor dots
  cx.fillStyle = '#0d0d0d';
  for (let r = 2; r < rows - 1; r++) {
    if (r === midRow) continue;
    for (let c = 3; c < cols - 2; c += 4) {
      cx.fillText('·', x0 + c * BOX_CW, y0 + r * BOX_CH);
    }
  }
}

// ── ASCII torch ────────────────────────────────────────────────────────────────
function drawTorch(x, y) {
  const flicker = Math.sin(combatTick * 0.02 + x) > 0;
  cx.font = "bold 11px 'Space Mono',monospace";
  cx.textAlign = 'center';
  cx.fillStyle = flicker ? '#664422' : '#443311';
  cx.fillText(flicker ? '^' : '*', x, y - 6);
  cx.fillStyle = '#332211';
  cx.fillText('|', x, y + 4);
  cx.textAlign = 'left';
}

// ── Entity sprites ─────────────────────────────────────────────────────────────
function drawEnemy(enemyData, x, y, hp, maxHp, phase) {
  const bob = Math.sin(combatTick * 0.006) * 2;
  const sprite = ASCII_ENEMY[enemyData.id] || ['[???]', ' (?) ', '  ?  '];

  cx.font = "bold 13px 'Space Mono','Courier New',monospace";
  cx.textAlign = 'center';
  sprite.forEach((line, i) => {
    cx.fillStyle = i === 1 ? (enemyData.color || C.red) : C.dim;
    cx.fillText(line, x, y + bob + (i - 1) * 15);
  });

  if (phase > 0) {
    cx.font = "bold 9px 'Space Mono',monospace";
    cx.fillStyle = '#993366';
    cx.fillText('** PHASE **', x, y + bob - 28);
  }
  cx.textAlign = 'left';
}

function drawPlayer(classId, x, y) {
  const bob = Math.sin(combatTick * 0.007) * 1.5;
  const sprite = ASCII_PLAYER[classId] || [' [@] ', '  @  ', '  Y  '];
  const clsColor = RD.classes[classId] ? RD.classes[classId].color : C.hi;

  cx.font = "bold 13px 'Space Mono','Courier New',monospace";
  cx.textAlign = 'center';
  sprite.forEach((line, i) => {
    cx.fillStyle = i === 1 ? clsColor : C.dim;
    cx.fillText(line, x, y + bob + (i - 1) * 15);
  });
  cx.textAlign = 'left';
}

// ── Words ──────────────────────────────────────────────────────────────────────
function drawWords() {
  cx.font = FONT;
  words.forEach((w, i) => {
    if (w.invisible && w.invisBlinkTimer > 0 && Math.floor(w.invisBlinkTimer / 200) % 2 === 0) return;

    const isActive = (i === activeWordIdx);
    const isAttack = w.isAttack;
    const txt = w.text;
    const typedLen = isActive ? typed.length : 0;

    if (w.isPickup) {
      const eff = w.pickupEffect;
      const blink = Math.floor(Date.now() / 400) % 2 === 0;
      if (typedLen > 0) {
        const done = txt.slice(0, typedLen);
        const rest = txt.slice(typedLen);
        const fullW = cx.measureText(txt).width;
        let dx = w.x - fullW / 2;
        cx.fillStyle = C.white; cx.fillText(done, dx, w.y);
        dx += cx.measureText(done).width;
        cx.fillStyle = C.dim; cx.fillText(rest, dx, w.y);
      } else {
        cx.textAlign = 'center';
        cx.fillStyle = isActive ? C.white : (blink ? eff.color : C.dim);
        cx.fillText(txt, w.x, w.y);
        cx.textAlign = 'left';
      }
      cx.font = "bold 9px 'Space Mono',monospace";
      cx.textAlign = 'center';
      cx.fillStyle = eff.color;
      cx.fillText(eff.label, w.x, w.y + 14);
      cx.font = FONT;
      cx.textAlign = 'left';
      return;
    }

    if (typedLen > 0 && isActive) {
      const done = txt.slice(0, typedLen);
      const rest = txt.slice(typedLen);
      const fullW = cx.measureText(txt).width;
      let dx = w.x - fullW / 2;
      cx.fillStyle = C.white;
      cx.fillText(done, dx, w.y);
      dx += cx.measureText(done).width;
      cx.fillStyle = isAttack ? C.red : C.dim;
      cx.fillText(rest, dx, w.y);
    } else {
      cx.textAlign = 'center';
      cx.fillStyle = isAttack ? C.red : (isActive ? C.hi : C.txt);
      cx.fillText(txt, w.x, w.y);
      cx.textAlign = 'left';
    }
  });
}

// ── Float text ─────────────────────────────────────────────────────────────────
function spawnFloat(x, y, str, color) {
  floats.push({ x, y, str, color, life: 1, vy: -1.2 });
}

function updateFloats(dt) {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.y += f.vy; f.life -= 0.018;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function drawFloats() {
  floats.forEach(f => {
    cx.globalAlpha = f.life;
    cx.font = "bold 13px 'Space Mono',monospace";
    cx.textAlign = 'center';
    cx.fillStyle = f.color;
    cx.fillText(f.str, f.x, f.y);
    cx.textAlign = 'left';
  });
  cx.globalAlpha = 1;
}

// ── CRT overlay ────────────────────────────────────────────────────────────────
function drawCRTOverlay() {
  if (!crtEnabled) return;
  cx.globalAlpha = 0.14;
  cx.fillStyle = '#000';
  for (let sy = 0; sy < H; sy += 3) cx.fillRect(0, sy, W, 1);
  cx.globalAlpha = 1;
  if (Math.random() < 0.008) {
    cx.globalAlpha = 0.05;
    cx.fillStyle = '#ffffff';
    cx.fillRect(0, Math.floor(Math.random() * H), W, 1);
    cx.globalAlpha = 1;
  }
}

// ── MAP ────────────────────────────────────────────────────────────────────────
function generateFloor(floorNum) {
  const nodes = [];
  const FE = RD.floorEnemies[floorNum];
  const normalPool = [...FE.normal].sort(() => Math.random() - 0.5);

  function mkNode(type, enemyId, col, row) {
    return { type, enemyId: enemyId || null, col, row, cleared:false, reachable:false, id: nodes.length };
  }

  nodes.push(mkNode('entry', null, 1, 0));
  nodes.push(mkNode('combat', normalPool[0] || 'goblin_scout', 0, 1));
  const hasShopA = Math.random() < 0.5;
  nodes.push(mkNode(hasShopA ? 'shop' : 'rest', null, 0, 2));
  nodes.push(mkNode('combat', normalPool[1] || normalPool[0], 0, 3));
  nodes.push(mkNode('combat', normalPool[2] || normalPool[1] || normalPool[0], 2, 1));
  nodes.push(mkNode('elite', FE.elite[0], 2, 2));
  nodes.push(mkNode(hasShopA ? 'rest' : 'shop', null, 2, 3));
  nodes.push(mkNode('boss', FE.boss, 1, 4));

  const adj = {
    0: [1, 4],
    1: [2], 2: [3], 3: [7],
    4: [5], 5: [6], 6: [7],
    7: [],
  };

  nodes[0].reachable = true;
  return { nodes, adj, floor: floorNum };
}

function buildMap() {
  const floor = P.floor || 1;
  const mapData = generateFloor(floor);
  mapNodes = mapData.nodes;
  mapCurIdx = 0;
  mapNodes[0].cleared = true;
  (mapData.adj[0] || []).forEach(i => { mapNodes[i].reachable = true; });
  G.mapAdj = mapData.adj;
  mapSelIdx = 1;
}

function getReachable() {
  return mapNodes.filter(n => n.reachable && !n.cleared);
}

function getNodePos() {
  const colX = [180, W/2, 620];
  const rowY  = [95, 185, 270, 355, 445];
  return mapNodes.map(n => ({ x: colX[n.col], y: rowY[n.row] }));
}

function drawMapScreen() {
  cx.fillStyle = C.bg;
  cx.fillRect(0, 0, W, H);

  text('FLOOR ' + (P.floor || 1), 20, 28, C.dim, FONT_SM);
  text('DUNGEON MAP', W/2, 28, C.hi, "bold 15px 'Space Mono',monospace", 'center');
  text('HP: ' + P.hp + '/' + P.maxHp, W - 20, 28, P.hp < P.maxHp * 0.3 ? C.red : C.txt, FONT_SM, 'right');

  const divLine = '─'.repeat(97);
  text(divLine, W/2, 38, C.dim, FONT_SM, 'center');

  const nodePos = getNodePos();

  // ASCII corridors
  cx.font = "12px 'Space Mono',monospace";
  cx.fillStyle = C.dim;
  const CH = 14;
  Object.entries(G.mapAdj || {}).forEach(([from, tos]) => {
    const fp = nodePos[+from];
    tos.forEach(to => {
      const tp = nodePos[to];
      const dy = tp.y - fp.y;
      const dx = tp.x - fp.x;
      const steps = Math.round(dy / CH);
      const char = Math.abs(dx) < 10 ? '|' : (dx > 0 ? '\\' : '/');
      cx.textAlign = 'center';
      for (let s = 1; s < steps; s++) {
        const t = s / steps;
        cx.fillText(char, fp.x + dx * t, fp.y + CH * s - 2);
      }
    });
  });

  // Nodes (text only)
  cx.font = "bold 12px 'Space Mono',monospace";
  mapNodes.forEach((node, i) => {
    const p = nodePos[i];
    const meta = ROOM_TYPE_META[node.type] || ROOM_TYPE_META.combat;
    const isSelected = (i === mapSelIdx);
    const isCurrent  = (i === mapCurIdx);
    const isReachable = node.reachable && !node.cleared;
    const isCleared  = node.cleared;

    cx.globalAlpha = isCleared ? 0.3 : (isReachable ? 1 : 0.4);
    cx.textAlign = 'center';

    // Selection brackets
    if (isSelected) {
      cx.fillStyle = C.white;
      cx.fillText('[', p.x - 18, p.y);
      cx.fillText(']', p.x + 18, p.y);
    }

    cx.fillStyle = isCleared ? C.dim : (isSelected ? C.white : meta.color);
    cx.fillText(meta.icon, p.x, p.y);

    cx.font = "9px 'Space Mono',monospace";
    cx.fillStyle = isCleared ? C.dim : (isSelected ? C.white : C.txt);
    cx.fillText(meta.label.toUpperCase(), p.x, p.y + 14);

    if (isCurrent && !isCleared) {
      cx.font = "bold 9px 'Space Mono',monospace";
      cx.fillStyle = C.dim;
      cx.fillText('YOU', p.x, p.y - 14);
    }

    cx.font = "bold 12px 'Space Mono',monospace";
    cx.globalAlpha = 1;
  });

  cx.textAlign = 'left';

  const divLine2 = '─'.repeat(97);
  text(divLine2, W/2, H - 26, C.dim, FONT_SM, 'center');
  text('<- -> navigate    ENTER enter room', W/2, H - 10, C.dim, FONT_SM, 'center');
  if (P.spells && P.spells.length > 0) {
    text('spells: ' + P.spells.join(' '), 20, H - 10, C.dim, FONT_SM);
  }
}

function mapNavigate(dir) {
  const reachable = mapNodes
    .map((n, i) => ({ n, i }))
    .filter(({ n }) => n.reachable && !n.cleared)
    .sort((a, b) => a.i - b.i);
  if (!reachable.length) return;
  const cur = reachable.findIndex(r => r.i === mapSelIdx);
  mapSelIdx = reachable[(cur + dir + reachable.length) % reachable.length].i;
}

// ── COMBAT INIT ────────────────────────────────────────────────────────────────
function initCombat(enemyId) {
  const eData = RD.enemies[enemyId];
  if (!eData) { console.error('Unknown enemy:', enemyId); return; }

  enemy = {
    ...eData,
    hp: eData.hp,
    currentPhase: 0,
    phasesFired: new Set(),
    effectiveSpeed: eData.wordSpeed * (P.wordSpeedMult || 1.0),
    effectiveInterval: eData.wordInterval,
    hitFlash: 0,
  };

  words = []; typed = ''; activeWordIdx = -1;
  combatTick = 0;
  spawnTimer  = enemy.effectiveInterval * 0.5;
  attackTimer = enemy.attackInterval * 0.7;
  freezeTimer = 0; hasteTimer = 0; flashTimer = 0;
  flashMsg = '';
  scrambleTimer = eData.special === 'scramble' ? 15000 : 0;
  pickupTimer = 14000 + Math.random() * 8000;
  invisWordCount = 0;
  floats = [];
  paused = false;

  if (eData.type === 'boss') RA.setTheme('boss');
  G.screen = 'combat';
}

// ── COMBAT UPDATE ──────────────────────────────────────────────────────────────
function updateCombat(dt) {
  if (paused) return;
  combatTick += dt;

  const frozen = freezeTimer > 0;
  if (frozen) freezeTimer -= dt;
  if (hasteTimer > 0) hasteTimer -= dt;
  if (flashTimer > 0) flashTimer -= dt;

  (P.spellCDs || []).forEach((cd, i) => {
    if (cd > 0) P.spellCDs[i] = Math.max(0, cd - dt);
  });

  if (enemy.id === 'dread_sorcerer') {
    scrambleTimer -= dt;
    if (scrambleTimer <= 0) {
      scrambleTimer = 15000;
      words.forEach(w => { w.x = rnd(LANE_X) + (Math.random() - 0.5) * 60; });
      spawnFloat(W/2, H/2 - 40, 'SCRAMBLE!', C.red);
    }
  }

  const speedFactor = frozen ? 0 : (hasteTimer > 0 ? 0.6 : 1.0);
  const speedMod = (P.upgrades && P.upgrades.includes('dk_chaos')) ? 2.0 : 1.0;

  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.y += w.speed * speedFactor * speedMod * (dt / 1000);
    if (w.invisBlinkTimer !== undefined) w.invisBlinkTimer -= dt;

    if (w.y >= WORD_EXIT_Y + 10) {
      if (w.isAttack) {
        let dmg = enemy.attackDmg;
        if (P.shield > 0) {
          const absorbed = Math.min(dmg, P.shield);
          P.shield -= absorbed; dmg -= absorbed;
          spawnFloat(PLAYER_CX, PLAYER_CY - 30, `-${absorbed}shld`, C.blue);
        }
        if (dmg > 0) {
          P.hp = Math.max(0, P.hp - dmg);
          RA.playPlayerHit();
          spawnFloat(PLAYER_CX, PLAYER_CY - 30, `-${dmg}`, C.red);
          flashTimer = 400; flashMsg = `-${dmg} HP`; flashColor = C.red;
        }
        if (i === activeWordIdx) { typed = ''; activeWordIdx = -1; }
      }
      words.splice(i, 1);
      if (activeWordIdx >= i) activeWordIdx = Math.max(-1, activeWordIdx - 1);
      updateActiveWord();
    }
  }

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCombatWord();
    spawnTimer = enemy.effectiveInterval * (frozen ? 2 : 1);
  }

  attackTimer -= dt;
  if (attackTimer <= 0) {
    spawnCombatWord(true);
    attackTimer = enemy.attackInterval;
  }

  if (!frozen) {
    pickupTimer -= dt;
    if (pickupTimer <= 0) {
      spawnPickup();
      pickupTimer = 14000 + Math.random() * 8000;
    }
  }

  if (enemy.phases && enemy.phases.length > 0) {
    const enemyMaxHp = RD.enemies[enemy.id].hp;
    enemy.phases.forEach((ph, idx) => {
      if (!enemy.phasesFired.has(idx) && enemy.hp / enemyMaxHp <= ph.hpThreshold) {
        enemy.phasesFired.add(idx);
        enemy.effectiveSpeed   *= (ph.speedMult || 1);
        enemy.effectiveInterval *= (ph.intervalMult || 1);
        enemy.currentPhase = idx + 1;
        RA.playBossPhase();
        flashMsg = ph.announce || 'PHASE CHANGE!';
        flashColor = '#993366';
        flashTimer = 2000;
        spawnFloat(W/2, H/2, ph.announce || 'PHASE!', '#993366');
      }
    });
  }

  updateFloats(dt);

  if (P.hp <= 0) {
    if (P.deathless && !P.deathlessUsed) {
      P.hp = 1; P.deathlessUsed = true;
      flashMsg = 'DEATHLESS!'; flashColor = '#993366'; flashTimer = 1500;
    } else {
      RA.playGameOver(); RA.stopMusic(1.5);
      G.screen = 'gameover'; return;
    }
  }

  if (enemy.hp <= 0) {
    enemy.hp = 0; words = [];
    RA.playRoomClear();
    P.gold = (P.gold || 0) + (enemy.loot && enemy.loot.gold || 0);
    mapNodes[G.combatNodeIdx].cleared = true;
    (G.mapAdj[G.combatNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
    mapSelIdx = (G.mapAdj[G.combatNodeIdx] || [])[0] || 0;
    if (P.regenPerRoom) P.hp = Math.min(P.maxHp, P.hp + P.regenPerRoom);

    if (enemy.type === 'boss') {
      if (enemy.id === 'tyrant_prime') {
        G.screen = 'victory'; RA.playVictory(); RA.stopMusic(2); return;
      }
      P.floor = (P.floor || 1) + 1;
      RA.setTheme('dungeon'); G.screen = 'combat_result';
    } else {
      G.screen = 'upgrade'; RA.setTheme('dungeon');
    }
    upgradeOptions = pickUpgrades(3); upgradeChosen = false;
  }
}

function spawnCombatWord(isAttack) {
  const isInvis = enemy.special === 'invisible' && !isAttack && (invisWordCount % 3 === 2);
  if (enemy.special === 'invisible') invisWordCount++;

  const atkWords = RD.attackWords[enemy.floor] || RD.attackWords[1];
  const txt = isAttack ? rnd(atkWords) : pickWord();
  const laneIdx = Math.floor(Math.random() * 3);
  const xOff = (Math.random() - 0.5) * 50;

  words.push({
    text: txt,
    x: LANE_X[laneIdx] + xOff,
    y: WORD_SPAWN_Y,
    speed: enemy.effectiveSpeed,
    isAttack: !!isAttack,
    invisible: !!isInvis,
    invisBlinkTimer: isInvis ? 800 : 0,
  });
  updateActiveWord();
}

// ── PICKUPS ────────────────────────────────────────────────────────────────────
const PICKUP_SYMS = ['!', '@', '#', '$', '%', '&', '*', '(', ')'];
const PICKUP_EFFECTS = [
  { type:'hp',     amount:20,  label:'+20hp',   color:C.cyan },
  { type:'hp',     amount:35,  label:'+35hp',   color:C.cyan },
  { type:'gold',   amount:25,  label:'+¢25',    color:C.gold },
  { type:'shield', amount:20,  label:'+shld20', color:C.blue },
  { type:'dmg',    amount:0.3, label:'+0.3dmg', color:C.hi   },
];

function spawnPickup() {
  const eff = PICKUP_EFFECTS[Math.floor(Math.random() * PICKUP_EFFECTS.length)];
  const len = Math.random() < 0.5 ? 2 : 3;
  let sym = '';
  for (let i = 0; i < len; i++) sym += PICKUP_SYMS[Math.floor(Math.random() * PICKUP_SYMS.length)];
  const laneIdx = Math.floor(Math.random() * 3);
  const xOff = (Math.random() - 0.5) * 40;
  words.push({
    text: sym, x: LANE_X[laneIdx] + xOff, y: WORD_SPAWN_Y,
    speed: 9, isAttack: false, invisible: false, invisBlinkTimer: 0,
    isPickup: true, pickupEffect: eff,
  });
  updateActiveWord();
}

function updateActiveWord() {
  if (typed.length === 0) { activeWordIdx = -1; return; }
  activeWordIdx = words.findIndex(w => w.text.startsWith(typed));
}

// ── INPUT ──────────────────────────────────────────────────────────────────────
function processKey(key) {
  if (G.screen === 'title') {
    if (key === 'Enter') { G.screen = 'class_select'; RA.startMusic('dungeon'); }
    if (key === 'c' || key === 'C') crtEnabled = !crtEnabled;
    return;
  }

  if (G.screen === 'class_select') {
    if (key === 'ArrowLeft')  classSelectIdx = (classSelectIdx + 2) % 3;
    if (key === 'ArrowRight') classSelectIdx = (classSelectIdx + 1) % 3;
    if (key === 'Enter')      startRun(CLASS_IDS[classSelectIdx]);
    return;
  }

  if (G.screen === 'map') {
    if (key === 'ArrowLeft')  mapNavigate(-1);
    if (key === 'ArrowRight') mapNavigate(1);
    if (key === 'Enter') {
      const node = mapNodes[mapSelIdx];
      if (node && node.reachable && !node.cleared) enterNode(mapSelIdx);
    }
    return;
  }

  if (G.screen === 'combat') {
    if (key === 'Escape') { paused = !paused; return; }
    if (paused) {
      if (key === 'm' || key === 'M') RA.toggleMute();
      if (key === 'c' || key === 'C') crtEnabled = !crtEnabled;
      return;
    }

    if (P.spells && P.spells.length > 0) {
      const spellIdx = parseInt(key) - 1;
      if (spellIdx >= 0 && spellIdx < P.spells.length) { activateSpell(spellIdx); return; }
    }

    if (key === 'Backspace') { typed = typed.slice(0, -1); updateActiveWord(); return; }
    if (key.length !== 1) return;

    const nextTyped = typed + key;

    if (P.spells) {
      const spIdx = P.spells.findIndex(s => s === nextTyped);
      if (spIdx >= 0) { activateSpell(spIdx); typed = ''; activeWordIdx = -1; return; }
    }

    const match = words.find(w => w.text.startsWith(nextTyped));
    if (match) {
      typed = nextTyped; RA.playKeyCorrect(); updateActiveWord();
      if (match.text === typed) destroyWord(words.indexOf(match));
    } else {
      RA.playKeyWrong();
      if (typed.length > 0) typed = '';
      const single = words.find(w => w.text.startsWith(key));
      if (single) {
        typed = key; updateActiveWord();
        if (single.text === typed) destroyWord(words.indexOf(single));
      } else { typed = ''; activeWordIdx = -1; }
    }
    return;
  }

  if (G.screen === 'upgrade' || G.screen === 'combat_result') {
    if (!upgradeChosen && G.screen === 'upgrade') {
      const idx = parseInt(key) - 1;
      if (idx >= 0 && idx < upgradeOptions.length) {
        applyUpgrade(upgradeOptions[idx]); upgradeChosen = true; RA.playUpgradePick();
        setTimeout(() => { RA.setTheme('dungeon'); G.screen = 'map'; }, 700);
      }
    } else if (G.screen === 'combat_result' && key === 'Enter') {
      buildMap(); RA.setTheme('dungeon'); G.screen = 'map';
    }
    return;
  }

  if (G.screen === 'shop') {
    if (key === 'Escape') { G.screen = 'map'; return; }
    if (key === 'ArrowUp')   G.shopIdx = Math.max(0, (G.shopIdx || 0) - 1);
    if (key === 'ArrowDown') G.shopIdx = Math.min((G.shopItems || []).length - 1, (G.shopIdx || 0) + 1);
    if (key === 'Enter') {
      const item = (G.shopItems || [])[(G.shopIdx || 0)];
      if (item && P.gold >= item.cost && !item.owned) {
        P.gold -= item.cost; applyUpgrade(item.upgrade); item.owned = true; RA.playUpgradePick();
      }
    }
    return;
  }

  if (G.screen === 'rest') {
    if (key === 'Enter') {
      P.hp = Math.min(P.maxHp, P.hp + Math.floor(P.maxHp * 0.35));
      mapNodes[G.restNodeIdx].cleared = true;
      (G.mapAdj[G.restNodeIdx] || []).forEach(i => { mapNodes[i].reachable = true; });
      mapSelIdx = (G.mapAdj[G.restNodeIdx] || [])[0] || 0;
      G.screen = 'map';
    }
    return;
  }

  if (G.screen === 'gameover' || G.screen === 'victory') {
    if (key === 'Enter') G.screen = 'title';
    return;
  }
}

function destroyWord(idx) {
  if (idx < 0 || idx >= words.length) return;
  const w = words[idx];

  if (w.isPickup) {
    const eff = w.pickupEffect;
    if (eff.type === 'hp')     P.hp = Math.min(P.maxHp, P.hp + eff.amount);
    if (eff.type === 'gold')   P.gold = (P.gold || 0) + eff.amount;
    if (eff.type === 'shield') P.shield = (P.shield || 0) + eff.amount;
    if (eff.type === 'dmg')    P.dmgMult += eff.amount;
    RA.playWordDestroy();
    spawnFloat(w.x, w.y - 20, eff.label, eff.color);
    words.splice(idx, 1);
    if (activeWordIdx >= idx) activeWordIdx = Math.max(-1, activeWordIdx - 1);
    typed = ''; updateActiveWord();
    return;
  }

  let dmg = Math.ceil(w.text.length * P.dmgMult);
  if (P.longshot && w.text.length >= 8) dmg *= 3;
  if (P.upgrades && P.upgrades.includes('dk_chaos')) dmg *= 2;
  if (P.berserk && P.hp < P.maxHp * 0.3) dmg = Math.ceil(dmg * 1.75);

  enemy.hp = Math.max(0, enemy.hp - dmg);
  RA.playWordDestroy(); RA.playEnemyHit();
  spawnFloat(w.x, w.y - 20, `-${dmg}`, C.gold);

  if (P.vampiric) {
    P.hp = Math.min(P.maxHp, P.hp + 2);
    spawnFloat(PLAYER_CX + 20, PLAYER_CY - 20, '+2', C.txt);
  }

  words.splice(idx, 1);
  if (activeWordIdx >= idx) activeWordIdx = Math.max(-1, activeWordIdx - 1);
  typed = ''; updateActiveWord();
}

function activateSpell(spellIdx) {
  const spellName = P.spells[spellIdx];
  const cd = P.spellCDs[spellIdx];
  if (cd > 0) return;

  const upg = RD.upgrades.find(u => u.spell === spellName);
  if (!upg) return;

  const amp = P.spellAmp ? 1.5 : 1.0;
  P.spellCDs[spellIdx] = upg.cd;
  RA.playSpellCast();

  switch (spellName) {
    case 'freeze':
      freezeTimer = 3000 * amp;
      spawnFloat(W/2, ENEMY_CY, 'FREEZE!', C.blue);
      break;
    case 'shield':
      P.shield = (P.shield || 0) + Math.floor(30 * amp);
      spawnFloat(PLAYER_CX, PLAYER_CY - 30, `SHIELD+${Math.floor(30*amp)}`, C.blue);
      break;
    case 'nova': {
      const wCount = words.length;
      const novaDmg = Math.floor(15 * amp);
      enemy.hp = Math.max(0, enemy.hp - wCount * novaDmg);
      spawnFloat(W/2, H/2, `NOVA! -${wCount * novaDmg}`, C.hi);
      words = []; typed = ''; activeWordIdx = -1;
      break;
    }
    case 'haste':
      hasteTimer = 5000 * amp;
      spawnFloat(W/2, ENEMY_CY, 'HASTE!', C.gold);
      break;
    case 'drain': {
      const drainAmt = Math.floor(20 * amp);
      enemy.hp = Math.max(0, enemy.hp - drainAmt);
      P.hp = Math.min(P.maxHp, P.hp + drainAmt);
      spawnFloat(W/2, H/2, `DRAIN +${drainAmt}HP`, C.txt);
      break;
    }
    case 'blast': {
      const blastDmg = Math.floor(80 * amp);
      enemy.hp = Math.max(0, enemy.hp - blastDmg);
      spawnFloat(ENEMY_CX, ENEMY_CY - 30, `-${blastDmg}`, C.hi);
      break;
    }
  }
}

// ── UPGRADES ───────────────────────────────────────────────────────────────────
function pickUpgrades(count) {
  const pool = [...RD.upgrades];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const result = [], usedTypes = new Set();
  for (const u of pool) {
    if (result.length >= count) break;
    if (!usedTypes.has(u.type)) { result.push(u); usedTypes.add(u.type); }
  }
  while (result.length < count && pool.length > result.length) {
    const u = pool.find(x => !result.includes(x));
    if (u) result.push(u); else break;
  }
  return result.slice(0, count);
}

function applyUpgrade(upg) {
  if (!upg) return;
  if (!P.upgrades) P.upgrades = [];
  P.upgrades.push(upg.id);

  const e = upg.effect || {};
  if (e.maxHpBonus) P.maxHp += e.maxHpBonus;
  if (e.healNow)    P.hp = Math.min(P.maxHp, P.hp + e.healNow);
  if (e.wordSpeedMult) P.wordSpeedMult = (P.wordSpeedMult || 1) * e.wordSpeedMult;
  if (e.dmgMult)    P.dmgMult += e.dmgMult;
  if (e.regenPerRoom) P.regenPerRoom = (P.regenPerRoom || 0) + e.regenPerRoom;
  if (e.berserk)    P.berserk = true;
  if (e.vampiric)   P.vampiric = true;
  if (e.longshot)   P.longshot = true;
  if (e.deathless)  P.deathless = true;
  if (e.chaos)      P.dmgMult *= 2;

  if (upg.type === 'spell' && upg.spell) {
    if (!P.spells) { P.spells = []; P.spellCDs = []; }
    if (!P.spells.includes(upg.spell)) { P.spells.push(upg.spell); P.spellCDs.push(0); }
  }
}

// ── RUN INIT ───────────────────────────────────────────────────────────────────
function startRun(classId) {
  const cls = RD.classes[classId];
  P = {
    classId,
    hp:   cls.hp + (cls.id === 'warrior' ? 15 : 0),
    maxHp: cls.hp + (cls.id === 'warrior' ? 15 : 0),
    dmgMult: cls.dmgMult,
    wordSpeedMult: cls.wordSpeedMult,
    gold: 0, floor: 1,
    spells: [], spellCDs: [], upgrades: [],
    berserk:false, vampiric:false, longshot:false, deathless:false,
    shield: 0, regenPerRoom: 0,
    spellAmp: cls.id === 'mage',
  };
  if (cls.startSpell) { P.spells.push(cls.startSpell); P.spellCDs.push(0); }
  buildMap(); RA.setTheme('dungeon'); G.screen = 'map';
}

function enterNode(nodeIdx) {
  const node = mapNodes[nodeIdx];
  mapCurIdx = nodeIdx;
  if (P.regenPerRoom && node.type !== 'rest') P.hp = Math.min(P.maxHp, P.hp + P.regenPerRoom);

  if (node.type === 'combat' || node.type === 'elite' || node.type === 'boss') {
    G.combatNodeIdx = nodeIdx;
    RA.setTheme(node.type === 'boss' ? 'boss' : 'combat');
    initCombat(node.enemyId);
  } else if (node.type === 'rest') {
    G.restNodeIdx = nodeIdx; G.screen = 'rest';
  } else if (node.type === 'shop') {
    setupShop(nodeIdx); G.screen = 'shop';
  }
}

function setupShop(nodeIdx) {
  const available = RD.upgrades.filter(u => !P.upgrades.includes(u.id));
  const pool = [...available].sort(() => Math.random() - 0.5).slice(0, 3);
  G.shopItems = pool.map(u => {
    const cost = u.rarity === 'epic' ? 80 : u.rarity === 'rare' ? 55 : u.rarity === 'uncommon' ? 35 : 20;
    return { upgrade: u, cost, owned: false };
  });
  G.shopIdx = 0; G.shopNodeIdx = nodeIdx;
}

  text('choose an upgrade', W/2, 68, C.dim, FONT_SM, 'center');
  text('─'.repeat(97), W/2, 80, C.dim, FONT_SM, 'center');

  const colW = W / 3;
  upgradeOptions.forEach((u, i) => {
    const cx_ = colW * i + colW / 2;
    const rarCol = RD.rarityColor[u.rarity] || C.txt;
    const typeIcon = { passive:'=', spell:'*', deck:'~' }[u.type] || '?';

    text('[' + (i+1) + ']', cx_, 108, rarCol, "bold 18px 'Space Mono',monospace", 'center');
    text(typeIcon, cx_, 134, C.dim, "bold 18px 'Space Mono',monospace", 'center');
    text(u.name, cx_, 160, C.white, "bold 13px 'Space Mono',monospace", 'center');
    text(u.rarity + ' ' + u.type, cx_, 176, rarCol, FONT_SM, 'center');
    text('─'.repeat(22), cx_, 188, C.dim, FONT_SM, 'center');

    cx.font = FONT_SM;
    cx.fillStyle = C.txt;
    wrapText(u.desc, cx_ - 92, 204, 184, 16, 'center');
  });

  if (!upgradeChosen) {
    text('1    2    3', W/2, H - 16, C.dim, FONT_SM, 'center');
  } else {
    text('...', W/2, H - 16, C.gold, FONT_SM, 'center');
  }
}

function drawCombatResultScreen() {
  cx.fillStyle = C.bg;
  cx.fillRect(0, 0, W, H);

  text('BOSS DEFEATED!', W/2, 150, C.hi, "bold 38px 'Space Mono',monospace", 'center');
  text('floor ' + ((P.floor||1) - 1) + ' cleared', W/2, 196, C.dim, FONT, 'center');
  text('─'.repeat(40), W/2, 214, C.dim, FONT_SM, 'center');

  text('hp: ' + P.hp + ' / ' + P.maxHp, W/2, 252, P.hp < P.maxHp*0.3 ? C.red : C.txt, FONT, 'center');
  text('gold: ¢' + P.gold, W/2, 280, C.gold, FONT, 'center');
  if (P.upgrades && P.upgrades.length) text('upgrades: ' + P.upgrades.length, W/2, 308, C.dim, FONT, 'center');

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('ENTER -> next floor', W/2, 382, C.txt, FONT, 'center');
}

function drawShopScreen() {
  cx.fillStyle = C.bg;
  cx.fillRect(0, 0, W, H);

  text('SHOP', W/2, 46, C.hi, "bold 28px 'Space Mono',monospace", 'center');
  text('¢' + P.gold, W/2, 70, C.gold, FONT, 'center');
  text('─'.repeat(60), W/2, 82, C.dim, FONT_SM, 'center');

  const items = G.shopItems || [];
  items.forEach((item, i) => {
    const u = item.upgrade;
    const selected = i === (G.shopIdx || 0);
    const canBuy = P.gold >= item.cost && !item.owned;
    const rowY = 112 + i * 60;
    const rarCol = RD.rarityColor[u.rarity] || C.txt;

    const prefix = selected ? '> ' : '  ';
    text(prefix + u.name, 80, rowY, item.owned ? C.dim : C.white, "bold 13px 'Space Mono',monospace");
    text(u.rarity + ' · ' + u.type, 80, rowY + 16, item.owned ? C.dim : rarCol, FONT_SM);
    text(u.desc, 80, rowY + 30, item.owned ? C.dim : C.txt, "9px 'Space Mono',monospace");
    const costStr = item.owned ? 'OWNED' : ('¢' + item.cost);
    text(costStr, W - 80, rowY + 8, item.owned ? C.dim : (canBuy ? C.gold : C.red), FONT, 'right');
  });

  text('─'.repeat(60), W/2, 308, C.dim, FONT_SM, 'center');
  text('^ v navigate  ENTER buy  ESC leave', W/2, H - 16, C.dim, FONT_SM, 'center');
}

function drawRestScreen() {
  cx.fillStyle = C.bg;
  cx.fillRect(0, 0, W, H);

  text('+ REST SITE +', W/2, 164, C.txt, "bold 28px 'Space Mono',monospace", 'center');
  text('a moment of respite in the dungeon', W/2, 204, C.dim, FONT_SM, 'center');
  text('─'.repeat(44), W/2, 220, C.dim, FONT_SM, 'center');

  const healAmt = Math.floor(P.maxHp * 0.35);
  text(`heal ${healAmt} hp  (${P.hp} -> ${Math.min(P.maxHp, P.hp + healAmt)})`, W/2, 270, C.txt, FONT, 'center');
  text(`max hp: ${P.maxHp}`, W/2, 300, C.dim, FONT, 'center');

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER TO REST', W/2, 372, C.txt, FONT, 'center');
}

function drawGameOverScreen() {
  cx.fillStyle = C.bg;
  cx.fillRect(0, 0, W, H);

  text('DEFEATED', W/2, 170, C.red, "bold 50px 'Space Mono',monospace", 'center');
  text('─'.repeat(28), W/2, 188, C.dim, FONT_SM, 'center');

  text('slain by ' + (enemy ? enemy.name : 'the dungeon'), W/2, 230, C.txt, FONT, 'center');
  text('floor ' + (P.floor || 1), W/2, 258, C.dim, FONT, 'center');
  text('gold: ¢' + (P.gold || 0), W/2, 286, C.gold, FONT, 'center');
  if (P.upgrades && P.upgrades.length) text('upgrades: ' + P.upgrades.length, W/2, 314, C.dim, FONT, 'center');

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER TO RETURN', W/2, 392, C.dim, FONT, 'center');
}

function drawVictoryScreen() {
  cx.fillStyle = C.bg;
  cx.fillRect(0, 0, W, H);

  text('TYRANT PRIME', W/2, 130, C.hi, "bold 40px 'Space Mono',monospace", 'center');
  text('DEFEATED!', W/2, 182, C.txt, "bold 36px 'Space Mono',monospace", 'center');
  text('─'.repeat(32), W/2, 198, C.dim, FONT_SM, 'center');

  text('the dungeon has been conquered', W/2, 242, C.dim, FONT_SM, 'center');
  text('class: ' + (P.classId || '').toUpperCase(), W/2, 284, C.txt, FONT, 'center');
  text('hp: ' + P.hp + '/' + P.maxHp, W/2, 312, P.hp < P.maxHp*0.3 ? C.red : C.txt, FONT, 'center');
  text('gold: ¢' + P.gold, W/2, 340, C.gold, FONT, 'center');
  text('upgrades: ' + (P.upgrades || []).length, W/2, 368, C.dim, FONT, 'center');

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) text('PRESS ENTER TO PLAY AGAIN', W/2, 434, C.txt, FONT, 'center');
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────────
let lastT = 0;

function loop(t) {
  const dt = Math.min(t - lastT, 50);
  lastT = t;

  cx.clearRect(0, 0, W, H);

  switch (G.screen) {
    case 'title':         drawTitle();             break;
    case 'class_select':  drawClassSelectScreen();  break;
    case 'map':           drawMapScreen();           break;
    case 'combat':        updateCombat(dt); drawCombatScreen(); break;
    case 'upgrade':       drawUpgradeScreen();       break;
    case 'combat_result': drawCombatResultScreen();  break;
    case 'shop':          drawShopScreen();          break;
    case 'rest':          drawRestScreen();          break;
    case 'gameover':      drawGameOverScreen();      break;
    case 'victory':       drawVictoryScreen();       break;
  }

  drawCRTOverlay();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Backspace'].includes(e.key))
    e.preventDefault();
  processKey(e.key);
});

requestAnimationFrame(loop);
</script>
</body>
</html>
